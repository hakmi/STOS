<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Studio PRO - HAKMI Abdelkrim</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Recharts (Graphes) -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.9/umd/Recharts.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .glass-dark { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05); }
        .graph-container { background: rgba(11, 17, 32, 0.7); border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.05); padding: 1rem; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .text-gradient { background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Style Visio / Webcam */
        .webcam-container {
            position: fixed; bottom: 20px; right: 20px; width: 220px; height: 160px;
            background: #000; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid #ef4444; overflow: hidden; z-index: 50;
        }
        .webcam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .recording-indicator {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
            padding: 4px 8px; border-radius: 20px; display: flex; align-items: center; gap: 6px; color: white; font-size: 10px; font-weight: bold;
        }
        .recording-dot { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="selection:bg-blue-500/30 relative">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, LineChart, Line, AreaChart, Area } = window.Recharts;

        // ==========================================
        // ICONES DEFINITION (Fix for ReferenceError)
        // ==========================================
        const Icons = {
            Zap: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Box: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
            Target: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Cable: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M4 9a2 2 0 0 1-2-2V3h6v4a2 2 0 0 1-2 2Z"/><path d="M20 9a2 2 0 0 0 2-2V3h-6v4a2 2 0 0 0 2 2Z"/><path d="M12 22v-8"/><path d="M8 14h8"/><path d="M6 9v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9"/></svg>,
            CheckSquare: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
            TrendingUp: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
            Activity: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
            Server: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>,
            ShieldAlert: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>,
            BookOpen: ({className}) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        };

        // ==========================================
        // BASE DE DONNÉES QCM (Échantillons Complets)
        // ==========================================
        const qcmPools = {
            'EXPLOITATION': [
                { id: 1, theme: "Consignation", question: "Quelle est l'habilitation requise pour accomplir les opérations de consignation d'un ouvrage HT ?", options: ["H1", "H2", "HC", "H0"], correctIndex: 2, justification: "L'habilitation HC autorise à séparer, condamner et vérifier l'absence de tension." },
                { id: 2, theme: "Manœuvres", question: "La 'Séparation des sources d'énergie' en HT implique nécessairement :", options: ["L'ouverture d'un disjoncteur uniquement.", "L'ouverture de sectionneurs offrant une coupure pleinement apparente.", "De retirer les relais.", "De couper le courant continu."], correctIndex: 1, justification: "Un disjoncteur n'offre pas de coupure visible de sécurité." },
                { id: 3, theme: "MALT", question: "Lors de la mise en place d'une MALT/CC portable, quel est l'ordre chronologique obligatoire ?", options: ["Connecter aux phases d'abord.", "Connecter d'abord à la prise de terre, puis aux phases.", "Connecter les phases entre elles d'abord."], correctIndex: 1, justification: "La liaison à la terre doit être garantie en premier pour évacuer le courant induit." }
            ],
            'CONTROLE': [
                { id: 1, theme: "Protections", question: "Dans le test des relais numériques avec une valise d'injection (ex: Omicron), que fait la valise ?", options: ["Elle lit le manuel PDF.", "Elle injecte des courants et des tensions physiques très précis avec des angles spécifiques.", "Elle modifie le câblage interne."], correctIndex: 1, justification: "La valise simule exactement le réseau électrique." },
                { id: 2, theme: "Distance Z2", question: "En protection de distance, qu'est-ce que le dépassement de zone (Over-reach) ?", options: ["Refus de déclencher.", "Déclenchement à tort pour un défaut situé hors de sa zone (ex: ligne adjacente).", "Augmentation de la tension."], correctIndex: 1, justification: "Le relais lit une impédance fausse et brise la sélectivité." },
                { id: 3, theme: "Transfo 87T", question: "Qu'est-ce qui provoque souvent le déclenchement intempestif du relais différentiel lors de la mise sous tension d'un transfo ?", options: ["Le courant Inrush magnétisant.", "Le régleur en charge.", "Un court-circuit externe."], correctIndex: 0, justification: "L'inrush est bloqué par la retenue d'harmonique 2." }
            ],
            'TELECOM': [
                { id: 1, theme: "Réseau OSI", question: "À quelle couche opère un Routeur et quelle est sa fonction ?", options: ["Couche 1 - Amplifie le signal.", "Couche 3 - Achemine les paquets IP.", "Couche 2 - Filtre les MAC."], correctIndex: 1, justification: "Le routeur interconnecte des sous-réseaux via l'adresse logique IP." },
                { id: 2, theme: "SDH", question: "Dans la hiérarchie numérique synchrone, quel est le débit brut de la trame STM-1 ?", options: ["2 Mbps", "155.52 Mbps", "10 Gbps"], correctIndex: 1, justification: "C'est l'autoroute de l'information des réseaux énergétiques." },
                { id: 3, theme: "CPL", question: "La technologie CPL consiste à :", options: ["Chauffer le câble.", "Utiliser la ligne Haute Tension pour transporter la haute fréquence.", "Couper le courant."], correctIndex: 1, justification: "Très robuste, utilise des condensateurs de couplage et bouchons de ligne." }
            ]
        };

        // ==========================================
        // MODULES INGÉNIERIE
        // ==========================================
        const ProtectionModule = () => {
            const [lineLength, setLineLength] = useState(62.0);
            const [z1Mag, setZ1Mag] = useState(0.42); 
            const [r1Mag, setR1Mag] = useState(0.12); 
            const [tms, setTms] = useState(0.1);
            const [vll, setVll] = useState(60);
            const [z1F, setZ1F] = useState(3.22);
            const [z0F, setZ0F] = useState(13.01);

            const calcDistance = useMemo(() => {
                const X_total = parseFloat(lineLength) * parseFloat(z1Mag);
                const R_total = parseFloat(lineLength) * parseFloat(r1Mag);
                const rxData = [ { R: 0, X: 0, Z1: 0, Z2: 0 }, { R: R_total*0.8, X: X_total*0.8, Z1: X_total*0.8, Z2: X_total*1.2 }, { R: R_total*1.2, X: X_total*1.2, Z1: null, Z2: X_total*1.2 } ];
                return { Z1_X: X_total*0.8, Z1_R: R_total*0.8, Z2_X: X_total*1.2, Z2_R: R_total*1.2, rxData };
            }, [lineLength, z1Mag, r1Mag]);

            const tccData = useMemo(() => {
                let data = [];
                for (let i = 1.5; i <= 20; i += 0.5) data.push({ i_ratio: i, time: parseFloat(((parseFloat(tms) * 0.14) / (Math.pow(i, 0.02) - 1)).toFixed(2)) });
                return data;
            }, [tms]);

            const calcFaults = () => {
                const vln = (vll * 1000) / Math.sqrt(3);
                return { i3ph: isNaN(vln / z1F)? 0 : ((vln / z1F)/1000).toFixed(2), i1ph: isNaN(vln)? 0 : ((3 * vln / (Number(z1F)+Number(z1F)+Number(z0F)))/1000).toFixed(2) };
            };

            return (
                <div className="space-y-6">
                    <div className="glass-panel p-6 rounded-2xl">
                        <div className="flex items-center mb-6 border-b border-slate-700 pb-4"><i className="fas fa-crosshairs text-purple-400 text-2xl mr-4 bg-purple-500/20 p-3 rounded-lg border border-purple-500/30"></i><div><h2 className="text-xl font-bold text-white">Relais de Distance : Plan R-X (D60 / P442)</h2><p className="text-sm text-slate-400">Calcul des impédances Z1 (80%) et Z2 (120%)</p></div></div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="col-span-1 space-y-3 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                <div><label className="block text-xs font-bold text-slate-400 mb-1">Long. Ligne (km)</label><input type="number" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-purple-500" value={lineLength} onChange={e=>setLineLength(e.target.value)} /></div>
                                <div><label className="block text-xs font-bold text-slate-400 mb-1">X Ligne (Ω/km)</label><input type="number" step="0.01" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-purple-500" value={z1Mag} onChange={e=>setZ1Mag(e.target.value)} /></div>
                                <div><label className="block text-xs font-bold text-slate-400 mb-1">R Ligne (Ω/km)</label><input type="number" step="0.01" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-purple-500" value={r1Mag} onChange={e=>setR1Mag(e.target.value)} /></div>
                                <div className="mt-4 pt-4 border-t border-slate-700 space-y-2">
                                    <div className="bg-slate-900 p-2 rounded"><p className="text-[10px] text-slate-400">Z1 (80%)</p><p className="text-emerald-400 font-mono font-bold text-sm">X: {calcDistance.Z1_X.toFixed(2)} Ω | R: {calcDistance.Z1_R.toFixed(2)} Ω</p></div>
                                    <div className="bg-slate-900 p-2 rounded"><p className="text-[10px] text-slate-400">Z2 (120%)</p><p className="text-amber-400 font-mono font-bold text-sm">X: {calcDistance.Z2_X.toFixed(2)} Ω | R: {calcDistance.Z2_R.toFixed(2)} Ω</p></div>
                                </div>
                            </div>
                            <div className="col-span-2 graph-container h-[320px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={calcDistance.rxData} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" /><XAxis dataKey="R" stroke="#94a3b8" /><YAxis stroke="#94a3b8" />
                                        <Tooltip contentStyle={{backgroundColor: '#0f172a', borderColor: '#334155', color:'#fff'}} />
                                        <Area type="monotone" dataKey="Z2" stroke="#f59e0b" fill="#f59e0b" fillOpacity={0.2} name="Zone 2" />
                                        <Area type="monotone" dataKey="Z1" stroke="#10b981" fill="#10b981" fillOpacity={0.4} name="Zone 1" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass-panel p-6 rounded-2xl">
                            <div className="flex items-center mb-6 border-b border-slate-700 pb-4"><i className="fas fa-chart-line text-sky-400 text-2xl mr-4 bg-sky-500/20 p-3 rounded-lg border border-sky-500/30"></i><div><h2 className="text-lg font-bold text-white">Courbe IEC 60255 (SI)</h2></div></div>
                            <div className="mb-4"><label className="block text-xs font-bold text-slate-400 mb-1">TMS</label><input type="number" step="0.05" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white" value={tms} onChange={e=>setTms(e.target.value)} /></div>
                            <div className="graph-container h-[200px]"><ResponsiveContainer width="100%" height="100%"><LineChart data={tccData}><XAxis dataKey="i_ratio" hide/><YAxis stroke="#94a3b8"/><Line type="monotone" dataKey="time" stroke="#38bdf8" strokeWidth={2} dot={false}/></LineChart></ResponsiveContainer></div>
                        </div>
                        <div className="glass-panel p-6 rounded-2xl">
                            <div className="flex items-center mb-6 border-b border-slate-700 pb-4"><i className="fas fa-bolt text-rose-400 text-2xl mr-4 bg-rose-500/20 p-3 rounded-lg border border-rose-500/30"></i><div><h2 className="text-lg font-bold text-white">Courants de Court-Circuit</h2></div></div>
                            <div className="grid grid-cols-3 gap-2 mb-6">
                                <div><label className="text-xs text-slate-400">V (kV)</label><input type="number" className="w-full p-2 bg-slate-900 rounded text-white border border-slate-600" value={vll} onChange={e=>setVll(e.target.value)} /></div>
                                <div><label className="text-xs text-slate-400">Z1 (Ω)</label><input type="number" className="w-full p-2 bg-slate-900 rounded text-white border border-slate-600" value={z1F} onChange={e=>setZ1F(e.target.value)} /></div>
                                <div><label className="text-xs text-slate-400">Z0 (Ω)</label><input type="number" className="w-full p-2 bg-slate-900 rounded text-white border border-slate-600" value={z0F} onChange={e=>setZ0F(e.target.value)} /></div>
                            </div>
                            <div className="flex justify-between gap-4"><div className="flex-1 bg-slate-800/50 p-4 rounded-xl text-center border border-slate-700"><p className="text-xs text-rose-400 uppercase">Icc 3Ph</p><p className="text-2xl font-black text-white">{calcFaults().i3ph} kA</p></div><div className="flex-1 bg-slate-800/50 p-4 rounded-xl text-center border border-slate-700"><p className="text-xs text-orange-400 uppercase">Icc 1Ph</p><p className="text-2xl font-black text-white">{calcFaults().i1ph} kA</p></div></div>
                        </div>
                    </div>
                </div>
            );
        };

        const TransformerModule = () => {
            const [vHv, setVHv] = useState(60000); const [vLv, setVLv] = useState(10000); const [measRatio, setMeasRatio] = useState(10.4);
            const [gas, setGas] = useState({ h2: 120, ch4: 80, c2h6: 40, c2h4: 15, c2h2: 0, co: 250 });

            const calcTTR = () => { const exp = (vHv / (vLv / Math.sqrt(3))); const err = Math.abs(((measRatio - exp) / exp) * 100).toFixed(3); return { expected: exp.toFixed(3), error: err, pass: err <= 0.5 }; };
            const ttrRes = calcTTR();

            const calcDGA = () => {
                const tdcg = parseInt(gas.h2) + parseInt(gas.ch4) + parseInt(gas.c2h6) + parseInt(gas.c2h4) + parseInt(gas.c2h2) + parseInt(gas.co);
                let status = "", color = "";
                if (parseInt(gas.c2h2) > 35) { status = "ALERTE ARC ÉLECTRIQUE"; color = "text-rose-500"; } else if (tdcg <= 720) { status = "NORMAL (Cond. 1)"; color = "text-emerald-400"; } else if (tdcg <= 1920) { status = "ATTENTION (Cond. 2)"; color = "text-amber-400"; } else { status = "CRITIQUE"; color = "text-rose-600"; }
                return { tdcg, status, color };
            };
            const dgaRes = calcDGA();
            const dgaChartData = Object.keys(gas).map(k => ({ name: k.toUpperCase(), value: parseInt(gas[k]), fill: k==='c2h2'?'#e11d48':'#3b82f6' }));

            return (
                <div className="space-y-6">
                    <div className="glass-panel p-6 rounded-2xl">
                        <div className="flex items-center justify-between mb-6 border-b border-slate-700 pb-4"><div className="flex items-center"><i className="fas fa-flask text-orange-400 text-2xl mr-4 bg-orange-500/20 p-3 rounded-lg border border-orange-500/30"></i><div><h2 className="text-xl font-bold text-white">Diagnostic DGA (Serveron)</h2></div></div><div className="text-right"><p className="text-xs text-slate-400 uppercase">TDCG</p><p className={`text-2xl font-black ${dgaRes.color}`}>{dgaRes.tdcg} ppm</p></div></div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="col-span-1 grid grid-cols-2 gap-3 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                {Object.keys(gas).map(g => <div key={g}><label className="block text-xs font-bold text-slate-400 mb-1 uppercase">{g}</label><input type="number" className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-white text-sm" value={gas[g]} onChange={e => setGas({...gas, [g]: e.target.value})} /></div>)}
                                <div className="col-span-2 mt-2 p-3 rounded bg-slate-900"><p className={`font-black text-center ${dgaRes.color}`}>{dgaRes.status}</p></div>
                            </div>
                            <div className="col-span-2 graph-container h-[250px]"><ResponsiveContainer width="100%" height="100%"><BarChart data={dgaChartData}><CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false}/><XAxis dataKey="name" stroke="#94a3b8"/><YAxis stroke="#94a3b8"/><Tooltip contentStyle={{backgroundColor: '#0f172a', borderColor: '#334155'}}/><Bar dataKey="value" radius={[4,4,0,0]}><Cell fill="#3b82f6"/></Bar></BarChart></ResponsiveContainer></div>
                        </div>
                    </div>
                    <div className="glass-panel p-6 rounded-2xl">
                        <div className="flex items-center mb-6 border-b border-slate-700 pb-4"><i className="fas fa-cube text-indigo-400 text-2xl mr-4 bg-indigo-500/20 p-3 rounded-lg border border-indigo-500/30"></i><div><h2 className="text-xl font-bold text-white">Test Rapport de Transformation (TTR)</h2></div></div>
                        <div className="grid grid-cols-3 gap-4 mb-4">
                            <div><label className="text-xs font-bold text-slate-400">Tension HT (V)</label><input type="number" className="w-full p-2 bg-slate-900 rounded text-white" value={vHv} onChange={e=>setVHv(e.target.value)} /></div>
                            <div><label className="text-xs font-bold text-slate-400">Tension BT (V)</label><input type="number" className="w-full p-2 bg-slate-900 rounded text-white" value={vLv} onChange={e=>setVLv(e.target.value)} /></div>
                            <div><label className="text-xs font-bold text-slate-400">Rapport Mesuré</label><input type="number" step="0.01" className="w-full p-2 bg-slate-900 rounded text-white" value={measRatio} onChange={e=>setMeasRatio(e.target.value)} /></div>
                        </div>
                        <div className="bg-slate-800/50 p-4 rounded-xl flex justify-between"><div className="text-slate-300">Théorique : <span className="font-bold">{ttrRes.expected}</span></div><div className={`font-black ${ttrRes.pass ? 'text-emerald-400' : 'text-rose-500'}`}>Erreur : {ttrRes.error}%</div></div>
                    </div>
                </div>
            );
        };

        const CablesCheckModule = () => {
            const [echoTime, setEchoTime] = useState(12.5); const [vop, setVop] = useState(160);
            const dist = ((parseFloat(echoTime) * parseFloat(vop)) / 2).toFixed(1);
            
            const [tasks, setTasks] = useState([
                { id: 1, desc: "Mesure Résistance de contact < 50 µΩ", done: false },
                { id: 2, desc: "Test diélectrique Haute Tension AC validé", done: false },
                { id: 3, desc: "TTR et DGA d'huile conformes", done: false },
                { id: 4, desc: "Mesure de terre globale < 1 Ohm", done: false }
            ]);
            const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            const progress = Math.round((tasks.filter(t => t.done).length / tasks.length) * 100);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="glass-panel p-6 rounded-2xl">
                        <div className="flex items-center mb-6 border-b border-slate-700 pb-4"><i className="fas fa-wave-square text-cyan-400 text-2xl mr-4 bg-cyan-500/20 p-3 rounded-lg border border-cyan-500/30"></i><div><h2 className="text-xl font-bold text-white">Échométrie TDR</h2></div></div>
                        <div className="space-y-4 mb-6"><div><label className="block text-sm text-slate-400">Temps d'écho (µs)</label><input type="number" step="0.1" className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-white" value={echoTime} onChange={e=>setEchoTime(e.target.value)} /></div><div><label className="block text-sm text-slate-400">VOP (m/µs)</label><input type="number" className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-white" value={vop} onChange={e=>setVop(e.target.value)} /></div></div>
                        <div className="bg-slate-800/50 p-4 rounded-xl text-center"><p className="text-cyan-400 font-bold uppercase text-xs mb-1">Distance Défaut</p><p className="text-4xl font-black text-white">{dist} m</p></div>
                    </div>
                    <div className="glass-panel p-6 rounded-2xl">
                        <div className="flex items-center mb-6 border-b border-slate-700 pb-4"><i className="fas fa-tasks text-amber-400 text-2xl mr-4 bg-amber-500/20 p-3 rounded-lg border border-amber-500/30"></i><div><h2 className="text-xl font-bold text-white">Commissioning Rapide</h2></div></div>
                        <div className="w-full bg-slate-800 rounded-full h-2 mb-4"><div className="bg-amber-500 h-2 rounded-full transition-all" style={{width:`${progress}%`}}></div></div>
                        <div className="space-y-3">
                            {tasks.map(t => (
                                <label key={t.id} className="flex items-center gap-3 p-3 bg-slate-800/50 rounded border border-slate-700 cursor-pointer hover:border-amber-500/50">
                                    <input type="checkbox" className="w-5 h-5 accent-emerald-500" checked={t.done} onChange={() => toggleTask(t.id)}/>
                                    <span className={`text-sm ${t.done ? 'text-slate-500 line-through' : 'text-slate-300'}`}>{t.desc}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // MODULE ACADÉMIE (HABILITATION + WEBCAM + ADMIN)
        // ==========================================
        const AcademyModule = () => {
            const [view, setView] = useState('intro'); // intro, quiz, result, admin, admin_detail, ai_report
            const [spec, setSpec] = useState('EXPLOITATION');
            const [identity, setIdentity] = useState({ nom: '', prenom: '', matricule: '' });
            const [useWebcam, setUseWebcam] = useState(false);
            
            // Quiz State
            const [questions, setQuestions] = useState([]);
            const [currQ, setCurrQ] = useState(0);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(3600); // 60 min
            const [selOpt, setSelOpt] = useState(null);
            const [answersRec, setAnswersRec] = useState([]);

            // Admin State
            const [adminPwd, setAdminPwd] = useState('');
            const [selResultIndex, setSelResultIndex] = useState(null);

            const videoRef = useRef(null);
            const streamRef = useRef(null);

            // Webcam Logic
            useEffect(() => {
                if (view === 'quiz' && useWebcam) {
                    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(stream => { 
                        streamRef.current = stream; 
                        if(videoRef.current) videoRef.current.srcObject = stream; 
                        document.getElementById('webcam-container').style.display = 'block';
                    })
                    .catch(err => {
                        console.error("Webcam error", err);
                        alert("Caméra indisponible. L'examen continue sans surveillance.");
                    });
                } else {
                    if(streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                    const wc = document.getElementById('webcam-container');
                    if(wc) wc.style.display = 'none';
                }
            }, [view, useWebcam]);

            // Timer Logic
            useEffect(() => {
                let timer;
                if (view === 'quiz' && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft <= 0 && view === 'quiz') {
                    finishQuiz();
                }
                return () => clearInterval(timer);
            }, [view, timeLeft]);

            const startQuiz = () => {
                if(!identity.nom || !identity.matricule) { alert("Nom et Matricule obligatoires."); return; }
                const pool = qcmPools[spec] || qcmPools['EXPLOITATION'];
                const shuffled = [...pool].sort(() => 0.5 - Math.random());
                setQuestions(shuffled);
                setCurrQ(0); setScore(0); setTimeLeft(3600); setSelOpt(null); setAnswersRec([]);
                setView('quiz');
            };

            const finishQuiz = () => {
                let history = JSON.parse(localStorage.getItem('grid_academy_results') || '[]');
                const finalResult = { 
                    identity, spec, score, total: questions.length, 
                    date: new Date().toLocaleString(), timeUsed: 3600 - timeLeft,
                    answersRec, testSnapshot: questions
                };
                history.unshift(finalResult);
                localStorage.setItem('grid_academy_results', JSON.stringify(history));
                setView('result');
            };

            const handleNext = () => {
                const isCorrect = selOpt === questions[currQ].correctIndex;
                if(isCorrect) setScore(score + 1);
                
                const newRec = [...answersRec, { qIndex: currQ, selected: selOpt, isCorrect }];
                setAnswersRec(newRec);

                if(currQ + 1 < questions.length) { setCurrQ(currQ + 1); setSelOpt(null); }
                else {
                    let history = JSON.parse(localStorage.getItem('grid_academy_results') || '[]');
                    const finalResult = { 
                        identity, spec, score: isCorrect ? score+1 : score, total: questions.length, 
                        date: new Date().toLocaleString(), timeUsed: 3600 - timeLeft,
                        answersRec: newRec, testSnapshot: questions
                    };
                    history.unshift(finalResult);
                    localStorage.setItem('grid_academy_results', JSON.stringify(history));
                    setView('result');
                }
            };

            const formatTime = (sec) => `${Math.floor(sec/3600).toString().padStart(2,'0')}:${Math.floor((sec%3600)/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;

            // ---- VUES DE L'ACADÉMIE ----
            if (view === 'intro') return (
                <div className="glass-panel p-8 rounded-2xl max-w-2xl mx-auto animate-fadeIn mt-6">
                    <div className="text-center mb-8">
                        <i className="fas fa-graduation-cap text-5xl text-blue-400 mb-4 drop-shadow-md"></i>
                        <h2 className="text-3xl font-black text-white">Plateforme d'Habilitation</h2>
                        <p className="text-slate-400 mt-2">Évaluation officielle et certifiante du personnel.</p>
                    </div>
                    <div className="space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Nom de famille</label><input type="text" className="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none" value={identity.nom} onChange={e=>setIdentity({...identity, nom: e.target.value.toUpperCase()})} /></div>
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Prénom</label><input type="text" className="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none" value={identity.prenom} onChange={e=>setIdentity({...identity, prenom: e.target.value})} /></div>
                        </div>
                        <div><label className="text-xs font-bold text-slate-400 uppercase">Matricule Agent</label><input type="text" className="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none" value={identity.matricule} onChange={e=>setIdentity({...identity, matricule: e.target.value})} /></div>
                        <div>
                            <label className="text-xs font-bold text-slate-400 uppercase">Spécialité (Banque QCM)</label>
                            <select className="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none" value={spec} onChange={e=>setSpec(e.target.value)}>
                                <option value="EXPLOITATION">Exploitation HT/THT</option>
                                <option value="CONTROLE">Contrôle Électrique</option>
                                <option value="TELECOM">Télécom & SCADA</option>
                            </select>
                        </div>
                        <label className="flex items-center gap-3 p-4 bg-slate-800/50 rounded-xl border border-slate-700 cursor-pointer hover:border-blue-500/50 transition">
                            <input type="checkbox" className="w-5 h-5 accent-blue-500" checked={useWebcam} onChange={e=>setUseWebcam(e.target.checked)}/>
                            <span className="text-sm font-bold text-slate-200">Activer Surveillance Visio (Requis pour PV Officiel)</span>
                        </label>
                        <button onClick={startQuiz} className="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl shadow-lg shadow-blue-500/20 mt-4 transition">DÉMARRER L'EXAMEN (60 Min)</button>
                        <div className="pt-4 border-t border-slate-700 text-right">
                            <button onClick={()=>setView('admin_login')} className="text-slate-500 hover:text-white text-xs font-bold uppercase transition"><i className="fas fa-lock mr-2"></i> Accès Admin</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'quiz') {
                const q = questions[currQ];
                return (
                    <div className="max-w-3xl mx-auto animate-fadeIn pt-4">
                        <div className="flex justify-between items-center bg-slate-800/80 p-4 rounded-xl mb-6 border border-slate-700 shadow-md">
                            <div><p className="text-[10px] text-slate-400 uppercase font-bold">Candidat</p><p className="text-white font-bold text-sm"><i className="fas fa-user-tag text-blue-400 mr-2"></i>{identity.nom} {identity.prenom}</p></div>
                            <div className="text-center"><p className="text-[10px] text-slate-400 uppercase font-bold">Progression</p><p className="text-white font-bold text-sm">{currQ+1} / {questions.length}</p></div>
                            <div className="text-right"><p className="text-[10px] text-slate-400 uppercase font-bold">Temps Restant</p><p className={`text-lg font-mono font-black ${timeLeft<300?'text-rose-500 animate-pulse':'text-emerald-400'}`}><i className="fas fa-stopwatch mr-2"></i>{formatTime(timeLeft)}</p></div>
                        </div>
                        <div className="glass-panel p-8 rounded-3xl">
                            <div className="mb-4"><span className="px-3 py-1 bg-blue-500/20 text-blue-400 text-xs font-bold rounded-lg uppercase">{q.theme}</span></div>
                            <h3 className="text-xl font-bold text-white mb-8 leading-relaxed">{q.question}</h3>
                            <div className="space-y-3">
                                {q.options.map((opt, idx) => (
                                    <button key={idx} onClick={()=>setSelOpt(idx)} className={`w-full text-left p-4 rounded-xl border transition-all flex items-center ${selOpt===idx ? 'bg-blue-500/20 border-blue-500 text-white' : 'bg-slate-800/50 border-slate-700 text-slate-300 hover:border-blue-500/50'}`}>
                                        <div className={`w-5 h-5 rounded-full border-2 mr-4 flex items-center justify-center shrink-0 ${selOpt===idx ? 'border-blue-400' : 'border-slate-500'}`}><div className={`w-2.5 h-2.5 rounded-full ${selOpt===idx ? 'bg-blue-400' : 'bg-transparent'}`}></div></div>
                                        <span className="font-medium">{opt}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="mt-8 text-right"><button onClick={handleNext} disabled={selOpt===null} className="py-3 px-8 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-bold rounded-xl transition-all shadow-lg">Valider <i className="fas fa-arrow-right ml-2"></i></button></div>
                        </div>
                        {/* WEBCAM INJECTÉE VIA DOM */}
                        <div className="webcam-container" id="webcam-container">
                            <div className="recording-indicator"><span className="recording-dot"></span> SURVEILLANCE</div>
                            <video ref={videoRef} className="webcam-video" autoPlay muted playsInline></video>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                const pct = Math.round((score/questions.length)*100);
                const passed = pct >= 75;
                return (
                    <div className="flex flex-col items-center justify-center animate-fadeIn text-center pt-16">
                        <div className={`p-8 rounded-full mb-8 border-4 shadow-2xl ${passed?'bg-emerald-500/20 border-emerald-500/50 shadow-emerald-500/20':'bg-rose-500/20 border-rose-500/50 shadow-rose-500/20'}`}>
                            <i className={`fas ${passed?'fa-check-double text-emerald-400':'fa-times text-rose-400'} text-6xl`}></i>
                        </div>
                        <h2 className={`text-4xl font-black mb-2 ${passed?'text-emerald-400 text-gradient':'text-rose-400'}`}>{passed ? 'Habilitation Accordée' : 'Habilitation Refusée'}</h2>
                        <p className="text-slate-300 text-lg mb-10">Candidat : {identity.nom} | Score : <span className="text-white font-black">{score} / {questions.length}</span> ({pct}%)</p>
                        <button onClick={()=>setView('intro')} className="py-4 px-10 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold text-lg rounded-2xl transition-all shadow-lg"><i className="fas fa-undo mr-3"></i> Nouveau Test</button>
                    </div>
                );
            }

            if (view === 'admin_login') return (
                <div className="glass-panel p-8 rounded-2xl max-w-sm mx-auto mt-20 text-center animate-fadeIn">
                    <i className="fas fa-user-shield text-4xl text-slate-400 mb-4"></i>
                    <h2 className="text-xl font-bold text-white mb-6">Accès Administrateur</h2>
                    <input type="password" value={adminPwd} onChange={e=>setAdminPwd(e.target.value)} className="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-center text-white tracking-widest outline-none focus:border-blue-500 mb-4" placeholder="••••••••" />
                    <button onClick={()=>{if(adminPwd==='15041978') setView('admin'); else alert('Code incorrect');}} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition">Connexion</button>
                    <button onClick={()=>setView('intro')} className="w-full py-2 text-slate-500 hover:text-white text-xs font-bold uppercase mt-2">Annuler</button>
                </div>
            );

            if (view === 'admin') {
                const results = JSON.parse(localStorage.getItem('grid_academy_results') || '[]');
                return (
                    <div className="glass-panel p-6 md:p-8 rounded-2xl max-w-5xl mx-auto mt-6 animate-fadeIn h-[80vh] flex flex-col">
                        <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4 shrink-0">
                            <h2 className="text-2xl font-black text-white"><i className="fas fa-database text-blue-400 mr-3"></i>Base de Données RH</h2>
                            <div className="flex gap-3">
                                <button onClick={()=>{localStorage.removeItem('grid_academy_results'); setView('intro');}} className="px-4 py-2 bg-rose-600/20 text-rose-400 hover:bg-rose-600 hover:text-white rounded-lg text-xs font-bold transition"><i className="fas fa-trash-alt mr-2"></i>Purger</button>
                                <button onClick={()=>setView('intro')} className="px-4 py-2 bg-slate-700 text-white rounded-lg text-xs font-bold hover:bg-slate-600 transition"><i className="fas fa-sign-out-alt mr-2"></i>Quitter</button>
                            </div>
                        </div>
                        <div className="flex-grow overflow-y-auto custom-scrollbar bg-slate-900/50 rounded-xl border border-slate-700">
                            <table className="w-full text-left text-sm text-slate-300">
                                <thead className="bg-slate-800 text-slate-400 font-bold uppercase text-xs sticky top-0 shadow-md"><tr><th className="p-4">Date</th><th className="p-4">Candidat</th><th className="p-4">Domaine</th><th className="p-4 text-center">Score</th><th className="p-4 text-center">Action</th></tr></thead>
                                <tbody className="divide-y divide-slate-800">
                                    {results.map((res, i) => (
                                        <tr key={i} className="hover:bg-slate-800/80 transition-colors">
                                            <td className="p-4 text-xs">{res.date}</td>
                                            <td className="p-4"><div className="font-bold text-white">{res.identity.nom} {res.identity.prenom}</div><div className="text-[10px] text-slate-500">Mat: {res.identity.matricule}</div></td>
                                            <td className="p-4">{res.spec}</td>
                                            <td className="p-4 text-center"><span className={`px-2 py-1 rounded text-xs font-bold ${res.score/res.total >= 0.75 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}`}>{res.score}/{res.total}</span></td>
                                            <td className="p-4 text-center"><button onClick={()=>{setSelResultIndex(i); setView('admin_detail');}} className="px-3 py-1 bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white rounded text-xs font-bold transition">Détails</button></td>
                                        </tr>
                                    ))}
                                    {results.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-500">Aucune évaluation enregistrée.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            if (view === 'admin_detail') {
                const results = JSON.parse(localStorage.getItem('grid_academy_results') || '[]');
                const cand = results[selResultIndex];
                if(!cand) return null;
                return (
                    <div className="glass-panel p-6 md:p-8 rounded-2xl max-w-4xl mx-auto mt-6 animate-fadeIn h-[85vh] flex flex-col">
                        <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4 shrink-0">
                            <h2 className="text-xl font-bold text-white"><i className="fas fa-file-invoice text-blue-400 mr-3"></i>Rapport Détaillé</h2>
                            <button onClick={()=>setView('admin')} className="px-4 py-2 bg-slate-700 text-white rounded-lg text-xs font-bold hover:bg-slate-600 transition"><i className="fas fa-arrow-left mr-2"></i>Retour</button>
                        </div>
                        <div className="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-4">
                            <div className="bg-slate-800/80 p-6 rounded-xl border border-slate-700 flex justify-between items-center">
                                <div><h3 className="text-2xl font-black text-white">{cand.identity.nom} {cand.identity.prenom}</h3><p className="text-slate-400 text-sm">Spécialité : {cand.spec}</p></div>
                                <div className="text-right"><div className={`text-4xl font-black ${cand.score/cand.total >= 0.75 ? 'text-emerald-400' : 'text-rose-400'}`}>{Math.round((cand.score/cand.total)*100)}%</div><p className="text-xs text-slate-500">{cand.score}/{cand.total} correct</p></div>
                            </div>
                            <button onClick={()=>setView('ai_report')} className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-xl shadow-lg flex items-center justify-center transition"><i className="fas fa-brain mr-3"></i>Générer l'Expertise I.A. des failles techniques</button>
                            <div className="space-y-3">
                                {cand.answersRec.map((ans, i) => {
                                    const q = cand.testSnapshot[ans.qIndex];
                                    const isOk = ans.isCorrect;
                                    return (
                                        <div key={i} className={`p-4 rounded-xl border ${isOk?'bg-emerald-500/10 border-emerald-500/30':'bg-rose-500/10 border-rose-500/30'}`}>
                                            <p className="text-sm font-bold text-slate-200 mb-2"><span className="text-slate-500 mr-2">Q{i+1}.</span>{q.question}</p>
                                            <p className={`text-xs font-bold ${isOk?'text-emerald-400':'text-rose-400'}`}><i className={`fas ${isOk?'fa-check':'fa-times'} mr-2`}></i>Réponse : {ans.selected===-1?'Non répondu':q.options[ans.selected]}</p>
                                            {!isOk && <p className="text-xs font-bold text-emerald-400 mt-1"><i className="fas fa-arrow-right mr-2"></i>Requise : {q.options[q.correctIndex]}</p>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'ai_report') {
                const results = JSON.parse(localStorage.getItem('grid_academy_results') || '[]');
                const cand = results[selResultIndex];
                return (
                    <div className="glass-panel p-8 rounded-2xl max-w-4xl mx-auto mt-6 animate-fadeIn h-[85vh] flex flex-col">
                        <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4 shrink-0">
                            <h2 className="text-2xl font-black text-white"><i className="fas fa-robot text-indigo-400 mr-3"></i>Rapport d'Expertise IA</h2>
                            <button onClick={()=>setView('admin_detail')} className="px-4 py-2 bg-slate-700 text-white rounded-lg text-xs font-bold hover:bg-slate-600 transition"><i className="fas fa-times"></i> Fermer</button>
                        </div>
                        <div className="flex-grow overflow-y-auto custom-scrollbar p-6 bg-slate-900 rounded-xl border border-slate-700 text-slate-300 space-y-6">
                            <p className="text-sm italic border-l-4 border-indigo-500 pl-4">Analyse algorithmique des erreurs générée automatiquement pour cibler les besoins en formation du candidat {cand.identity.nom}.</p>
                            
                            <div><h3 className="text-lg font-bold text-white mb-2 text-indigo-400">1. Profil de l'évaluation</h3><p className="text-sm">Le candidat a obtenu un score de {cand.score}/{cand.total}. Spécialité : {cand.spec}.</p></div>
                            
                            {cand.score < cand.total ? (
                                <div>
                                    <h3 className="text-lg font-bold text-white mb-3 text-rose-400">2. Lacunes Techniques Identifiées</h3>
                                    <ul className="list-disc pl-5 space-y-2 text-sm">
                                        {cand.answersRec.filter(a=>!a.isCorrect).map((a,i) => {
                                            const q = cand.testSnapshot[a.qIndex];
                                            return <li key={i}><strong>Thème [{q.theme}] :</strong> Le candidat ignore les procédures standards. Justification rappelée : {q.justification}</li>;
                                        })}
                                    </ul>
                                    <h3 className="text-lg font-bold text-white mt-6 mb-2 text-amber-400">3. Risques Métier</h3>
                                    <p className="text-sm text-slate-400 bg-slate-800 p-4 rounded border border-slate-700">Ces erreurs sur le terrain peuvent entraîner de graves conséquences (perte de sélectivité, explosion de matériel, ou électrocution selon les thèmes échoués). Un recyclage technique sur ces points précis est formellement exigé avant toute délivrance de titre d'habilitation.</p>
                                </div>
                            ) : (
                                <div className="bg-emerald-500/10 border border-emerald-500/30 p-4 rounded-xl"><p className="text-emerald-400 font-bold">Excellente maîtrise technique. Aucune lacune détectée. Avis Favorable immédiat.</p></div>
                            )}
                        </div>
                    </div>
                );
            }

            return null;
        };

        // ==========================================
        // SIDEBAR ET ROUTAGE PRINCIPAL
        // ==========================================
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            const TabBtn = ({ id, icon: Icon, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-lg font-bold text-sm transition-all duration-200 ${activeTab === id ? 'bg-blue-600 text-white shadow-lg border border-blue-500/50' : 'text-slate-400 hover:bg-slate-800/80 hover:text-slate-200'}`}>
                    <Icon className="w-5 h-5"/> <span>{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen w-full relative">
                    
                    {/* FOND D'ECRAN THT SOMBRE ET GLASSMORPHISM */}
                    <div className="absolute inset-0 z-0 bg-slate-950">
                        <img src="https://images.unsplash.com/photo-1541888049688-6623d3ab2e88?auto=format&fit=crop&q=80" alt="Background" className="w-full h-full object-cover opacity-10 mix-blend-luminosity" />

        const rawGasQCMData = `
Q1. Quelle est la principale composante du gaz naturel ?
A) Le Propane
B) Le Butane
C) Le Méthane (CH4)
D) Le Monoxyde de carbone
Réponse : C - Justification : Le gaz naturel est composé à plus de 90% de méthane (CH4).
Q2. Quel est le produit chimique ajouté au gaz naturel pour lui donner son odeur caractéristique ?
A) L'éthanol
B) Le Tétrahydrothiophène (THT) ou Mercaptan
C) Le Chlore
D) Le Soufre pur
Réponse : B - Justification : Le gaz naturel est inodore. Le THT est injecté pour la sécurité (détection de fuites à 20% de la LIE).
Q3. Que signifie l'acronyme LIE ?
A) Limite Inférieure d'Explosivité
B) Ligne Interne Électrique
C) Limite d'Intervention Externe
D) Localisation Incendie Évidente
Réponse : A - Justification : C'est la concentration minimale de gaz dans l'air (environ 5% pour le méthane) pour qu'il y ait explosion.
Q4. Que signifie l'acronyme LSE ?
A) Limite Supérieure d'Explosivité
B) Ligne Standard Étanche
C) Local Sans Électricité
D) Lumière Sans Énergie
Réponse : A - Justification : C'est la concentration maximale de gaz dans l'air (environ 15% pour le méthane) au-delà de laquelle le mélange est trop riche pour exploser.
Q5. Quelle est la densité du gaz naturel par rapport à l'air ?
A) Il est plus lourd (d = 1.5)
B) Il a la même densité (d = 1)
C) Il est plus léger (d ≈ 0.6)
D) Il est liquide
Réponse : C - Justification : En cas de fuite, le gaz naturel monte et s'accumule dans les points hauts.
Q6. Dans la distribution Sonelgaz, quelle pression définit la Basse Pression (BP) ?
A) 21 mbar (ou 20 mbar)
B) 4 bar
C) 70 bar
D) 100 mbar
Réponse : A - Justification : La BP utilisée pour les abonnés domestiques est de 21 mbar.
Q7. Quelle est la plage de la Moyenne Pression type B (MPB) selon les normes de distribution ?
A) De 50 mbar à 4 bar
B) De 4 bar à 16 bar
C) De 16 bar à 70 bar
D) Moins de 20 mbar
Réponse : A - Justification : Le réseau de distribution urbain principal en MPB fonctionne jusqu'à 4 bar.
Q8. Quelle est la couleur normalisée du grillage avertisseur pour une conduite de Gaz ?
A) Rouge
B) Jaune
C) Bleu
D) Vert
Réponse : B - Justification : Le jaune est la couleur universelle pour repérer les canalisations de gaz souterraines.
Q9. À quelle distance au-dessus de la génératrice supérieure du tube gaz doit être posé le grillage avertisseur ?
A) Directement collé sur le tube
B) À 20 cm au-dessus du tube
C) À 1 mètre
D) Juste sous le goudron
Réponse : B - Justification : Cela permet à l'engin de terrassement d'accrocher le grillage jaune avant de percer la conduite.
Q10. Qu'est-ce qu'un Poste de Détente (PDC) ?
A) Un lieu de repos pour les agents
B) Une installation permettant de réduire la pression du gaz d'un réseau amont vers un réseau aval
C) Une station de compression
D) Un robinet de barrage
Réponse : B - Justification : Il réduit par exemple la Haute Pression (70 bar) en Moyenne Pression (4 bar).
Q11. Quel matériau est le plus utilisé aujourd'hui pour les réseaux de distribution gaz MPB souterrains ?
A) L'Acier galvanisé
B) Le Polyéthylène Haute Densité (PEHD)
C) La Fonte
D) Le Cuivre
Réponse : B - Justification : Le PEHD est flexible, résistant à la corrosion et ne nécessite pas de protection cathodique.
Q12. Comment assemble-t-on principalement les tubes en PEHD ?
A) Avec de la colle spéciale gaz
B) Par filetage
C) Par soudure électrosoudable ou bout-à-bout
D) Avec du ruban adhésif
Réponse : C - Justification : L'électrosoudage utilise une résistance intégrée dans le manchon qui fond le PEHD pour une fusion parfaite.
Q13. Lors d'une soudure électrosoudable PEHD, pourquoi faut-il gratter (écorcer) le tube ?
A) Pour le rendre rugueux
B) Pour enlever la couche oxydée superficielle qui empêcherait la fusion moléculaire
C) Pour enlever la couleur jaune
D) Pour réduire le diamètre
Réponse : B - Justification : Sans grattage, la soudure est défectueuse et fuira sous pression.
Q14. Que fait la vanne de Sécurité (Clapet de Sécurité ou SAV) dans un poste de détente ?
A) Elle augmente la pression
B) Elle coupe instantanément l'arrivée du gaz si la pression aval dépasse un seuil critique
C) Elle ajoute l'odorisant
D) Elle compte le gaz
Réponse : B - Justification : Le clapet de sécurité (Slam-shut valve) protège le réseau aval (et les clients) en cas de défaillance du régulateur.
Q15. À quoi sert la soupape d'échappement (Relief valve) dans un poste de détente ?
A) À vider le poste
B) À libérer de petites surpressions temporaires (ex: fermeture brusque des vannes aval) sans déclencher le clapet de sécurité
C) À faire du bruit
D) À filtrer le gaz
Réponse : B - Justification : Elle évite les coupures de gaz intempestives dues à des chocs de pression mineurs.
Q16. Quelle est la première action à faire face à une fuite de gaz enflammée sur le réseau (Torche) ?
A) L'éteindre avec de l'eau
B) L'éteindre avec un extincteur à poudre
C) Barrer (fermer) la vanne amont pour couper l'alimentation en gaz
D) Souffler dessus
Réponse : C - Justification : Si on éteint la flamme sans couper le gaz, le gaz va s'accumuler et créer une explosion massive.
Q17. Qu'est-ce que l'ATEX ?
A) Une marque de vannes
B) La réglementation concernant les ATmosphères EXplosives
C) Un type de gaz naturel
D) Un raccord isolant
Réponse : B - Justification : L'ATEX impose des équipements électriques spéciaux (anti-étincelles) dans les zones à risque gazier.
Q18. Un outil "Anti-étincelle" utilisé en intervention gaz est généralement fabriqué en :
A) Acier inoxydable
B) Alliage Cuivre-Béryllium ou Bronze-Aluminium
C) Titane pur
D) Fonte
Réponse : B - Justification : Ces alliages ne produisent pas d'étincelles lors d'un choc, évitant l'inflammation du gaz.
Q19. Que mesure un Explosimètre ?
A) La pression du gaz
B) Le pourcentage de la Limite Inférieure d'Explosivité (% LIE) d'un gaz combustible dans l'air
C) Le taux de CO2
D) Le débit de fuite
Réponse : B - Justification : Si l'explosimètre affiche 100% LIE, l'atmosphère est explosive (5% de méthane dans l'air).
Q20. Pourquoi installe-t-on un Raccord Isolant (Joint Isolant) sur une conduite en acier ?
A) Pour empêcher le gaz de fuir
B) Pour isoler électriquement la tuyauterie souterraine de l'installation aérienne, afin de maintenir la Protection Cathodique
C) Pour filtrer la poussière
D) Pour réduire la pression
Réponse : B - Justification : Il empêche les courants de protection cathodique de s'échapper vers d'autres structures métalliques.
Q21. Quel est le but de la Protection Cathodique sur un réseau Gaz en acier ?
A) Réchauffer le gaz
B) Empêcher la corrosion électrochimique du tube en acier enterré en lui imposant un potentiel négatif (cathode)
C) Éviter la foudre
D) Détecter les fuites
Réponse : B - Justification : Par courant imposé ou anodes sacrificielles, l'acier est protégé de l'oxydation.
Q22. Avant la mise en gaz d'un réseau neuf, on effectue un essai de résistance mécanique. Avec quoi ?
A) Du gaz naturel
B) De l'air comprimé ou de l'azote sec
C) De l'eau
D) De l'oxygène
Réponse : B - Justification : L'essai hydraulique est rare en distribution. L'air/azote est sûr et sec. Jamais de gaz naturel pour l'essai de résistance.
Q23. Pendant une "Purge" d'un réseau avant mise en gaz, quel est l'objectif ?
A) Nettoyer le tube à l'eau
B) Chasser tout l'air contenu dans la conduite en injectant le gaz naturel, jusqu'à avoir 100% de gaz (éliminant le risque de mélange explosif)
C) Mettre le tuyau sous vide
D) Ajouter du THT
Réponse : B - Justification : Le passage air->gaz est critique. On brûle souvent le gaz purgé ou on utilise l'explosimètre pour vérifier.
Q24. La pression de distribution domestique est garantie par :
A) Le compresseur
B) Le détendeur-régulateur placé dans le coffret client
C) Le compteur
D) La vanne d'arrêt
Réponse : B - Justification : Il abaisse la pression du réseau (ex: 4 bar) à la pression d'utilisation des appareils (21 mbar).
Q25. Quel est le rôle d'un filtre dans un poste de détente Gaz ?
A) Changer la couleur du gaz
B) Retenir les poussières, oxydes et impuretés qui pourraient endommager les sièges des régulateurs et compteurs
C) Liquéfier le gaz
D) Augmenter la pression
Réponse : B - Justification : La pureté du gaz est vitale pour la mécanique de précision des détendeurs.
Q26. Un client signale une "odeur de gaz". Quelle est la première consigne de sécurité au téléphone ?
A) Allumer la lumière pour chercher la fuite
B) Ne produire aucune étincelle (ne toucher à aucun interrupteur, téléphone ou sonnette), ouvrir les fenêtres, fermer l'arrivée de gaz et évacuer.
C) Appeler avec le téléphone fixe de la maison
D) Craquer une allumette près du compteur
Réponse : B - Justification : Le moindre arc électrique d'un interrupteur peut déclencher l'explosion de la pièce saturée en gaz.
Q27. En cas de présence de Monoxyde de Carbone (CO), d'où provient-il ?
A) D'une fuite du réseau Sonelgaz
B) D'une combustion incomplète du gaz naturel due à un manque de ventilation (manque d'oxygène) ou un conduit de cheminée bouché chez le client
C) De l'odorisant THT
D) Des conduites en PEHD
Réponse : B - Justification : Le CO est inodore, incolore et mortel. Le gaz naturel lui-même n'est pas toxique, mais asphyxiant s'il déplace l'air.
Q28. Sur un réseau acier, la "Mise à l'air libre" (Évent) des organes de sécurité du poste de détente doit obligatoirement :
A) Rester à l'intérieur du poste
B) Déboucher à l'extérieur, en hauteur, loin de toute source d'ignition
C) Être bouchée
D) Être raccordée à l'égout
Réponse : B - Justification : Si une soupape crache du gaz, il doit être dissipé rapidement dans l'atmosphère.
Q29. Quel est le principe de fonctionnement d'un détecteur de fuite de gaz portable (Catharomètre) ?
A) Il écoute le bruit de la fuite
B) L'oxydation catalytique du gaz sur un filament chauffé modifie la résistance électrique du pont de Wheatstone, proportionnellement à la concentration
C) Il sent l'odeur du THT
D) Il mesure la chute de pression
Réponse : B - Justification : Le filament de platine brûle le gaz, s'échauffe et déséquilibre le circuit électrique de mesure.
Q30. Dans la pose d'un réseau gaz sous chaussée, la profondeur minimale d'enfouissement est généralement de :
A) 10 cm
B) 30 cm
C) 80 cm à 1 mètre (selon les charges roulantes)
D) 3 mètres
Réponse : C - Justification : Cette profondeur protège la conduite des vibrations, du gel et des petits travaux de surface.
Q31. Lors de l'intervention de soudure (Bout-à-bout) PEHD, la température du miroir chauffant est d'environ :
A) 100°C
B) 210°C - 230°C
C) 500°C
D) 800°C
Réponse : B - Justification : C'est la température de fusion optimale du polyéthylène sans le dégrader (brûler).
Q32. Pourquoi doit-on purger l'eau des siphons sur les vieux réseaux gaz ?
A) Pour boire
B) L'eau condensée s'accumule dans les points bas et peut bloquer complètement le passage du gaz (bouchon d'eau)
C) Pour refroidir le sol
D) Pour nettoyer les conduites
Réponse : B - Justification : Moins fréquent avec le gaz sec moderne, mais vital sur les anciens réseaux.
Q33. Qu'est-ce que l'opération "d'écrasement" (Squeeze-off) sur un tube PEHD ?
A) Détruire le tube après usage
B) Aplatir temporairement le tuyau en plastique avec un outil mécanique spécifique pour couper le flux de gaz pendant une réparation, sans utiliser de vanne
C) Mesurer son épaisseur
D) Un défaut de fabrication
Réponse : B - Justification : Très utile en PEHD, mais nécessite de respecter des butées pour ne pas fissurer la matière.
Q34. Quel type de compteur est principalement utilisé pour les abonnés domestiques ?
A) Compteur à turbine
B) Compteur à soufflets (Diaphragme)
C) Compteur à ultrasons
D) Compteur à orifice
Réponse : B - Justification : Le compteur à parois déformables est très précis pour les faibles débits domestiques.
Q35. Dans un poste de comptage industriel, pourquoi installe-t-on un "Correcteur de Volume" (PTZ) ?
A) Pour réduire la facture
B) Le gaz est compressible. Le correcteur ramène le volume mesuré sous pression et température réelles à un volume "Normal" (0°C, 1 atm) pour une facturation équitable
C) Pour augmenter la pression
D) Pour filtrer le gaz
Réponse : B - Justification : La quantité d'énergie contenue dans 1 m3 à 4 bar est bien plus grande que dans 1 m3 à 20 mbar.
Q36. Le piquage en charge (Tapping / Prise en charge) sur une conduite Gaz Acier sous pression nécessite :
A) De couper le gaz dans toute la ville
B) L'utilisation d'une machine à percer étanche (Drilling machine) à travers une vanne soudée, évitant ainsi toute coupure d'alimentation des clients
C) De congeler le tuyau
D) De percer avec une simple chignole
Réponse : B - Justification : Permet de raccorder un nouveau client sans perturber le réseau existant.
Q37. Quelle est l'utilité du "Bypass" dans un Poste de Détente ?
A) Décorer le poste
B) Permettre l'alimentation continue en gaz des abonnés lors des opérations de maintenance ou de panne de la ligne de détente principale
C) Mélanger l'eau et le gaz
D) Vider le poste
Réponse : B - Justification : La ligne de secours (Bypass) est manuelle ou automatique selon les postes.
Q38. Sur une canalisation gaz en acier, l'enrobage (revêtement externe en bitume ou polyéthylène tri-couche) a pour but de :
A) Faciliter le glissement dans le sol
B) Fournir l'isolation électrique primaire entre l'acier et la terre, condition sine qua non au fonctionnement de la protection cathodique
C) Réduire la pression
D) Garder le gaz au chaud
Réponse : B - Justification : Sans enrobage, la protection cathodique consommerait trop de courant pour protéger la ligne.
Q39. La norme exige un espacement minimal entre une canalisation Gaz et un câble électrique souterrain. Généralement :
A) 2 cm
B) Aucun espacement
C) 20 cm en croisement
D) 2 mètres
Réponse : C - Justification : Prévient les arcs électriques vers la conduite gaz en cas de défaut du câble électrique.
Q40. En protection cathodique, le potentiel de protection standard mesuré par rapport à une électrode Cu/CuSO4 doit être au moins de :
A) + 1 Volt
B) - 0.85 Volt (-850 mV)
C) 0 Volt
D) 220 Volts
Réponse : B - Justification : C'est le critère d'immunité thermodynamique de l'acier contre la corrosion dans le sol.
Q41. Lors d'une intervention d'urgence pour forte odeur de gaz en immeuble, vous repérez la fuite. Que faites-vous en premier ?
A) Vous colmatez la fuite avec votre doigt
B) Vous ouvrez l'armoire électrique pour couper le courant
C) Vous ventilez massivement les lieux, coupez l'organe de coupure générale (vanne de pied) et interdisez tout point chaud ou manœuvre électrique
D) Vous allumez une torche
Réponse : C - Justification : Isoler l'énergie (Gaz) et dissiper la concentration sans créer la moindre étincelle.
Q42. Que signifie l'habilitation gaz "Z" ?
A) Zéro risque
B) Intervenant réalisant des opérations spécifiques nécessitant une grande qualification (Soudeur acier, Soudeur PE, etc.)
C) Zone rurale
D) Agent de bureau
Réponse : B - Justification : Les habilitations spécifiques (Soudure, intervention sous pression) valident le geste technique critique.
Q43. Pourquoi est-il interdit d'utiliser une flamme nue (briquet) pour rechercher une fuite de gaz ?
A) C'est difficile à voir
B) Le risque d'explosion ou de brûlure grave est absolu
C) Le gaz naturel éteint la flamme
D) C'est trop cher
Réponse : B - Justification : On utilise TOUJOURS un produit moussant (mille-bulles) ou un détecteur électronique.
Q44. Le gaz naturel est-il toxique s'il est inhalé en petite quantité ?
A) Oui, il détruit les poumons instantanément
B) Non, il n'est pas toxique, mais il est asphyxiant s'il remplace totalement l'oxygène dans une pièce fermée
C) Oui, il provoque le choléra
D) Non, il guérit l'asthme
Réponse : B - Justification : Le danger direct du méthane est l'explosion, pas l'intoxication chimique (contrairement au Monoxyde de Carbone).
Q45. Un "Défaut d'Isolement" sur un joint isolant d'une conduite acier se diagnostique par :
A) Une fuite de gaz visible
B) Une chute importante du potentiel de la protection cathodique (le courant s'échappe vers la structure en défaut)
C) Une odeur de brûlé
D) Le refroidissement du tuyau
Réponse : B - Justification : Si le joint est court-circuité, l'acier de la canalisation est relié à la terre globale du poste, annulant la protection.
Q46. Lors d'une réparation sur conduite PEHD par électrosoudage, l'agent oublie de maintenir les pièces immobiles pendant le temps de refroidissement (Cooling time). Risque ?
A) Aucun risque
B) Rupture microscopique de la zone de fusion, entraînant une fuite certaine lors de la remise sous pression
C) Le PEHD change de couleur
D) L'automate de soudage explose
Réponse : B - Justification : Le refroidissement naturel et sans contrainte mécanique garantit la cristallisation solide du PEHD.
Q47. Pour la consignation gaz d'un tronçon (LOTO), quelle est la procédure sûre ?
A) Fermer une vanne et commencer à scier
B) Fermer, condamner (cadenas), purger la pression, vérifier l'absence de gaz (explosimètre)
C) Demander à un collègue de tenir le tuyau
D) Augmenter la pression
Réponse : B - Justification : Sécuriser la zone de travail exige la certitude de la pression nulle et de l'absence d'atmosphère explosive.
Q48. Un compresseur de gaz dans une station est utilisé pour :
A) Réduire la pression pour la distribution
B) Augmenter la pression du gaz pour compenser les pertes de charge sur les longues distances de transport
C) Transformer le gaz en liquide
D) Ajouter de l'eau
Réponse : B - Justification : La compression redonne de l'énergie au gaz pour son déplacement sur le réseau de Transport.
Q49. Qu'est ce que le phénomène d'hydrate dans les conduites gaz à haute pression ?
A) La formation de glace solide (eau + méthane) qui peut bloquer complètement les vannes et détendeurs lors de fortes détentes
B) L'évaporation de l'acier
C) Une réaction nucléaire
D) La création de pétrole
Réponse : A - Justification : C'est pourquoi on réchauffe parfois le gaz avant la détente (avec des échangeurs) pour éviter la formation de bouchons de glace.
Q50. L'organe de Coupure de Réseau (Vanne de sectionnement) permet :
A) De décorer la rue
B) D'isoler un secteur de la ville en cas d'accident sans pénaliser le reste des abonnés
C) D'augmenter le débit
D) De mélanger les gaz
Réponse : B - Justification : Sectoriser le réseau est la base de la maintenance et de la sécurité publique (Limiter l'impact d'un incident).
Q51. Quelle est la vitesse de l'air de ventilation requise dans un local gaz fermé (ex: poste de détente maçonné) ?
A) Aucune ventilation n'est nécessaire
B) Il doit y avoir une ventilation naturelle haute et basse pour évacuer immédiatement toute fuite éventuelle (le gaz monte)
C) Une climatisation à 18°C
D) Un ventilateur à eau
Réponse : B - Justification : Le méthane est plus léger que l'air, une grille haute est indispensable pour dissiper les concentrations sous plafond.
Q52. Pourquoi équipe-t-on les détendeurs domestiques d'un "réarmement manuel" ?
A) Pour obliger le client à appeler Sonelgaz
B) Si le gaz coupe (ex: chute de réseau), l'appareil se ferme et ne se rouvre pas seul au retour du gaz, évitant d'envoyer du gaz dans une cuisinière restée ouverte
C) Pour faire du sport
D) Pour compter le nombre de coupures
Réponse : B - Justification : C'est une sécurité fondamentale contre les accumulations de gaz post-coupure.
Q53. Dans le cadre de l'odorisation du gaz, quel équipement vérifie la concentration en THT sur le réseau ?
A) Un thermomètre
B) Un chromatographe ou micro-odorimètre
C) Un voltmètre
D) Un luxmètre
Réponse : B - Justification : L'appareil analyse chimiquement l'air prélevé pour certifier que le seuil réglementaire de Mercaptan est respecté.
Q54. L'inspection pédestre systématique du réseau gaz urbain (Recherche Systématique de Fuite - RSF) se fait avec :
A) Un chien renifleur
B) Un appareil de détection ultra-sensible (ppm) à prélèvement d'air continu au ras du sol ou des bouches d'égout
C) Un drône
D) Une torche
Réponse : B - Justification : Cela permet de repérer des micro-fuites souterraines bien avant qu'elles ne deviennent dangereuses.
Q55. Un tuyau de cuivre d'installation intérieure Gaz doit être assemblé par :
A) Soudure à l'étain tendre (plombier)
B) Brasage fort (cuivre-phosphore ou argent) avec température de fusion > 450°C
C) Avec du silicone
D) Avec de la colle PVC
Réponse : B - Justification : La réglementation exige le brasage fort car il résiste mieux à la chaleur en cas d'incendie, évitant l'alimentation du feu par la fuite de gaz.
Q56. Que signifie le "PCS" du gaz naturel facturé au client ?
A) Pression Constante Système
B) Pouvoir Calorifique Supérieur (Quantité d'énergie dégagée par la combustion complète d'un m3 de gaz, incluant la chaleur de condensation de l'eau)
C) Point de Compression Standard
D) Poste de Contrôle Sécurisé
Réponse : B - Justification : On facture le client sur l'énergie (kWh) qu'il consomme, pas seulement sur le volume, d'où l'application d'un coefficient (PCS).
Q57. Le "Gaz de Pétrole Liquéfié" (GPL - Butane/Propane) se différencie du Gaz Naturel (Méthane) par :
A) Il est bleu
B) Il est plus lourd que l'air et s'accumule dans les caves et points bas
C) Il n'est pas inflammable
D) Il est transporté à 1000 bars
Réponse : B - Justification : Très important pour les interventions d'urgence. Le gaz naturel (Méthane) monte au plafond, le GPL rampe au sol.
Q58. Qu'est-ce qu'une "Mise hors gaz" d'un réseau acier ?
A) Fermer le robinet du client
B) Balayer le gaz présent dans la conduite en injectant un gaz inerte (Azote) pour éliminer tout risque d'explosion avant de découper le tube au chalumeau
C) Nettoyer avec de l'oxygène
D) Laisser ouvert à l'air pendant 10 minutes
Réponse : B - Justification : L'oxygène ne doit jamais se mélanger au gaz pendant un travail à chaud (soudure).
Q59. Dans un poste de détente, on trouve souvent deux détendeurs en série : le détendeur "Moniteur" (Monitor) et le détendeur "Actif" (Active). Pourquoi ?
A) Pour doubler la pression
B) Redondance de sécurité. Le moniteur est réglé un peu plus haut. Si l'actif casse et reste grand ouvert, le moniteur prend le relais et maintient la pression sans couper le client.
C) Pour mélanger le gaz
D) L'un est pour l'été, l'autre l'hiver
Réponse : B - Justification : Assure la continuité de service pour les gros industriels tout en garantissant la sécurité en cas de panne matérielle.
Q60. Un manomètre "Tube en U" à colonne d'eau est utilisé pour :
A) Mesurer la pression de 70 bar
B) Mesurer des très faibles pressions (ex: 21 mbar) ou vérifier l'étanchéité d'une installation intérieure domestique
C) Peser le gaz
D) Ajouter de l'eau au gaz
Réponse : B - Justification : Extrêmement précis pour les micro-fuites à basse pression, car 10 mbar = 100 mm de colonne d'eau.
Q61. L'essai d'étanchéité d'un branchement PEHD neuf avant remblai se fait à une pression de :
A) 1 bar
B) Généralement 6 bar pendant un temps donné (ex: 2h) sans baisse de pression (corrigée des variations de température)
C) 100 bar
D) Avec le gaz du réseau directement
Réponse : B - Justification : On teste toujours à une pression supérieure à la pression de service pour garantir les soudures.
Q62. Qu'est-ce qu'une vanne "Slam Shut" sur un régulateur gaz ?
A) C'est un clapet de sécurité à fermeture rapide qui coupe le flux si la pression aval dépasse un seuil de sécurité, protégeant le réseau aval de l'éclatement.
B) Une vanne pour ralentir le gaz
C) Une vanne d'ajout d'odeur
D) C'est le compteur
Réponse : A - Justification : C'est la dernière ligne de défense mécanique contre une surpression fatale.
Q63. Sur une chaudière à gaz, à quoi sert le thermocouple (sécurité flamme) ?
A) Chauffer l'eau plus vite
B) Si la flamme s'éteint (vent, coupure), le thermocouple refroidit, ne génère plus de courant, et l'électrovanne coupe l'arrivée de gaz pour éviter une explosion
C) Mesurer le gaz
D) Nettoyer le brûleur
Réponse : B - Justification : C'est la sécurité passive indispensable de tout appareil au gaz.
Q64. Dans le réseau de transport, qu'est-ce qu'un poste de sectionnement (Line Valve Station) ?
A) Une station essence
B) Une installation comprenant de grosses vannes motorisées permettant d'isoler des tronçons de pipeline (ex: tous les 20 km) en cas de rupture de la conduite
C) Un poste de détente BP
D) Une station de méthanisation
Réponse : B - Justification : Les vannes de sectionnement sont fermées automatiquement en cas de détection de forte chute de pression (Line Break).
Q65. La tuyauterie de gaz naturel dans l'industrie est standardisée mondialement avec la couleur :
A) Bleue
B) Jaune ou Ocre
C) Rouge
D) Verte
Réponse : B - Justification : Le jaune est la norme (Norme AFNOR / ISO) pour l'identification visuelle immédiate des fluides inflammables.
Q66. Pourquoi le gaz naturel produit-il de la condensation (givre) à l'extérieur des conduites lors de fortes chutes de pression (Postes de Détente) ?
A) Car le gaz fuit
B) Phénomène de Joule-Thomson : l'expansion soudaine du gaz entraîne une chute de sa température (environ 0.5°C par bar de chute), congelant l'humidité de l'air ambiant
C) L'acier devient de la glace
D) Le gaz est réfrigéré en usine
Réponse : B - Justification : D'où la nécessité de réchauffeurs sur les postes de détente très haute pression.
Q67. Quelle est la particularité de l'Habilitation électrique des agents travaillant sur des postes Gaz (ex: techniciens protection cathodique) ?
A) Ils n'en ont pas besoin
B) Ils doivent être habilités ATEX en plus de l'habilitation électrique classique, pour comprendre les risques des étincelles électriques en zone explosible
C) Ils sont habilités au nucléaire
D) Ils utilisent du 10 000 Volts
Réponse : B - Justification : L'électricité est la première source d'ignition en environnement gazier.
Q68. Qu'est ce qu'un "Pigtail" (Queue de cochon) en robinetterie gaz ?
A) La queue d'un animal
B) Une lyre de raccordement flexible (souvent en cuivre en spirale) utilisée pour raccorder des bouteilles de gaz haute pression à un détendeur
C) Un type de fuite
D) Un outil de soudure
Réponse : B - Justification : La forme en spirale absorbe les chocs et les dilatations mécaniques.
Q69. Lors du contrôle des soudures acier d'une conduite de transport gaz, la méthode CND (Contrôle Non Destructif) la plus courante est :
A) Frapper avec un marteau
B) La radiographie (Rayons X ou Gamma) ou les Ultrasons pour vérifier à l'intérieur du cordon de soudure s'il n'y a pas de fissures, inclusions ou manques de pénétration
C) Le test de l'éponge
D) La peinture
Réponse : B - Justification : Garantit l'intégrité à 100% de l'assemblage sous haute pression.
Q70. Un joint de bride "Klingerit" sur un réseau gaz sert à :
A) Ralentir le gaz
B) Assurer l'étanchéité absolue entre deux brides boulonnées
C) Créer une étincelle
D) Ajouter de l'odorisant
Réponse : B - Justification : Ces joints sans amiante sont conçus pour résister à la pression et aux fluides gaz.
Q71. En intervention sur un coffret de détente domestique, on découvre que l'évent du détendeur fuit en permanence. Que cela signifie-t-il ?
A) Le détendeur fonctionne parfaitement
B) La membrane interne du détendeur est percée. Le gaz s'échappe par la chambre de régulation (l'évent) et le détendeur doit être remplacé immédiatement
C) C'est normal quand il fait chaud
D) Il faut boucher l'évent avec du mastic
Réponse : B - Justification : L'évent permet au détendeur de "respirer". Si du gaz y sort, la membrane est rompue.
Q72. Quelle précaution prendre lors du stockage des tubes PEHD sur un parc ?
A) Les laisser en plein soleil pendant 5 ans
B) Les protéger des rayons UV prolongés (soleil) qui dégradent les chaînes polymères, et fermer les extrémités (bouchons) pour éviter les saletés et l'eau
C) Les remplir d'eau
D) Les peindre en noir
Réponse : B - Justification : Le PEHD perd ses propriétés mécaniques sous exposition UV intense et non protégée.
Q73. À quoi correspond l'Unité "SDR" (Standard Dimension Ratio) pour un tube PEHD ?
A) Son diamètre
B) Le rapport entre le diamètre extérieur du tube et son épaisseur de paroi. Un SDR 11 est plus épais et résiste à plus de pression qu'un SDR 17.
C) Sa couleur
D) Son poids en kilogrammes
Réponse : B - Justification : Indice fondamental pour le choix de la pression de service du tube plastique.
Q74. Un "Abonné Interruptible" sur le réseau gaz industriel est :
A) Un client qui ne paye pas
B) Un client industriel bénéficiant d'un tarif avantageux mais qui accepte que Sonelgaz lui coupe l'alimentation en gaz lors des pointes extrêmes de froid pour prioriser les clients domestiques
C) Un client qui coupe son gaz le dimanche
D) Une centrale nucléaire
Réponse : B - Justification : C'est le principe d'effacement pour sécuriser l'approvisionnement national en hiver.
Q75. Quel gaz est souvent utilisé comme "Gaz traceur" pour rechercher les micro-fuites sur les conduites enterrées non odorisées ?
A) L'Hydrogène ou l'Hélium
B) Le Carbone
C) L'Oxygène
D) Le Plomb
Réponse : A - Justification : Le mélange (Azote+Hydrogène) s'échappe rapidement par la moindre porosité et est détecté en surface par des "renifleurs" très sensibles.
Q76. Un plan "As-Built" (Tel que construit / Recollement) d'un réseau gaz est :
A) Un brouillon
B) Le plan définitif géoréférencé avec précision (coordonnées GPS), intégrant toutes les modifications faites lors des travaux, utilisé pour le repérage futur (SIG)
C) Un plan d'évacuation
D) Une facture
Réponse : B - Justification : Vital pour ne pas percer la conduite lors de travaux futurs (sécurité des tiers).
Q77. En régulation gaz, un "Pilote" associé à un régulateur de forte capacité permet de :
A) Conduire le camion de maintenance
B) Agir comme un petit régulateur ultra-précis qui fournit la pression de consigne pour commander le clapet du régulateur principal
C) Chauffer le gaz
D) Allumer la lumière
Réponse : B - Justification : La technologie "pilotée" offre une bien meilleure précision pour les gros débits et pressions.
Q78. Le "Venturi" d'un compteur à orifice est basé sur le principe physique :
A) De la gravité
B) De la dépression (Chute de pression) créée par l'accélération du fluide au passage d'un rétrécissement, permettant de calculer le débit (Loi de Bernoulli)
C) De la température
D) De l'électromagnétisme
Réponse : B - Justification : C'est le principe de la mesure de débit par organe déprimogène pour le grand transport industriel.
Q79. L'injection de Méthanol dans un ancien pipeline sert à :
A) Donner une odeur
B) Se mélanger avec l'eau et abaisser le point de congélation pour détruire ou prévenir la formation de bouchons d'hydrates (glace)
C) Nettoyer la rouille
D) Augmenter la pression
Réponse : B - Justification : Solution chimique d'urgence courante lors des grands froids sur les lignes de transport de gaz non parfaitement sec.
Q80. Quel est l'équipement de protection individuelle (EPI) critique spécifique aux interventions sur tuyauterie gaz en charge ?
A) Des gants de boxe
B) Des vêtements ignifugés (Coton traité ou Nomex) qui ne fondent pas et ne s'enflamment pas en cas de flash (feu flash)
C) Un maillot de bain
D) Des lunettes de soleil
Réponse : B - Justification : Les vêtements synthétiques fondent sur la peau en cas d'arc ou de flash feu, l'EPI ignifugé est vital.
Q81. Le "Pigging" (Racleur) sur un grand pipeline gazier sert à :
A) Trouver du pétrole
B) Insérer un piston (Pig) dans le tube, poussé par la pression du gaz, pour nettoyer les liquides/débris ou inspecter l'intérieur du tube avec des capteurs (Intelligent Pig)
C) Bloquer le gaz
D) Faire du bruit
Réponse : B - Justification : Outil indispensable de maintenance pour garder les conduites de transport propres et prévenir la corrosion interne.
Q82. La "Loi de Boyle-Mariotte" (P.V = Constante à T constante) implique que pour le gaz stocké :
A) Si on diminue le volume (compression), la pression diminue
B) Si on comprime le gaz (diminution du volume), la pression augmente proportionnellement
C) Le gaz change de couleur
D) Le gaz devient lourd
Réponse : B - Justification : Base de la physique des gaz compressibles.
Q83. Un "Chapeau de Vent" (Cowl) sur un évent d'évacuation de gaz sert à :
A) Rendre l'évent beau
B) Empêcher l'eau de pluie et les oiseaux d'entrer dans le tuyau, tout en dirigeant le gaz purgé vers le haut pour une dispersion rapide
C) Bloquer le gaz
D) Filtrer le CO2
Réponse : B - Justification : Évite le blocage de la soupape par un nid d'oiseau.
Q84. Le test de conformité d'une soudure bout-à-bout PEHD comprend l'inspection du "Bourrelet". Que cherche-t-on ?
A) Une peinture jaune
B) Un bourrelet régulier, double, uniforme tout autour de la circonférence, signe d'une pression et température de soudage parfaites
C) L'absence totale de bourrelet
D) Un bourrelet très fin d'un côté et épais de l'autre
Réponse : B - Justification : L'inspection visuelle du bourrelet est le critère CND premier de la soudure PEHD.
Q85. Qu'est-ce qu'une "Zone 1" dans la classification ATEX ?
A) Le parking du poste
B) Un emplacement où une atmosphère explosive gazeuse est susceptible de se présenter occasionnellement en fonctionnement normal
C) L'intérieur permanent de la cuve de gaz
D) Un bureau
Réponse : B - Justification : Zone 0 (Permanent), Zone 1 (Occasionnel), Zone 2 (Rare ou accidentel).
Q86. Si du GNL (Gaz Naturel Liquéfié) se répand sur le sol, que fait-il ?
A) Il brûle le sol
B) Il bout intensément (-162°C) en absorbant la chaleur, créant un énorme nuage de vapeur blanche (froid condensant l'eau de l'air) lourd puis qui s'élève en se réchauffant
C) Il reste liquide pendant des jours
D) Il se transforme en glace
Réponse : B - Justification : Le GNL est stocké à très basse température, son déversement crée un brouillard givrant massif.
Q87. Un manomètre "Bourdon" fonctionne par :
A) Électronique avancée
B) La déformation (déroulement) d'un tube cintré sous l'action de la pression du gaz interne, entraînant l'aiguille du cadran
C) Magnétisme
D) Lecture optique
Réponse : B - Justification : Technologie purement mécanique extrêmement robuste.
Q88. Un "Régulateur de Pression Axial" (Flux axial) se distingue par :
A) Son poids léger
B) Un cheminement du gaz en ligne droite à travers une chemise en caoutchouc dilatable, offrant une énorme capacité de débit et un fonctionnement très silencieux
C) Sa couleur rouge
D) Sa faible résistance au feu
Réponse : B - Justification : Les vannes type "Axial" ou "Gorter" sont la norme pour les énormes débits (Transport).
Q89. La formation de "Poussière noire" (Pyrophorique) dans les conduites gaz est dangereuse car :
A) Elle obstrue la vue
B) C'est du sulfure de fer généré par l'H2S. À l'ouverture d'un tube (contact avec l'oxygène de l'air), cette poussière s'enflamme spontanément, causant des brûlures et incendies
C) Elle fait fondre le PEHD
D) Elle coupe le signal radio
Réponse : B - Justification : Le risque Pyrophorique impose d'arroser l'intérieur du tube d'eau lors de la coupe.
Q90. Dans un poste de livraison gaz industriel, l'organe "Clapet anti-retour" sert à :
A) Payer la facture
B) Empêcher le gaz du client industriel (ou de ses compresseurs) de refluer vers le réseau du distributeur en cas de chute de pression amont
C) Réchauffer le gaz
D) Changer la direction
Réponse : B - Justification : Protège le réseau public contre la pollution ou la mise en surpression par une installation privée défectueuse.
Q91. Un "Défaut d'Odorisation" implique :
A) Que le gaz a trop bonne odeur
B) Que le niveau de THT injecté est trop bas, empêchant un nez humain de détecter une fuite, constituant une urgence d'exploitation absolue
C) Que la machine consomme trop d'électricité
D) Que la facture est erronée
Réponse : B - Justification : La loi impose de pouvoir sentir le gaz à 20% de sa limite explosive. L'absence de THT tue.
Q92. Le "Coup de bélier" (Water Hammer) sur un réseau gaz liquide ou fluide lourd :
A) N'existe pas
B) Est une puissante onde de choc de surpression créée par la fermeture trop rapide d'une vanne, pouvant éclater les joints et tuyaux
C) Fait fuir le THT
D) Est produit par un outil
Réponse : B - Justification : Les grandes vannes (motorisées) doivent être fermées lentement (progressivité) pour éviter l'onde de choc.
Q93. L'expression "Pouvoir de Coupure" (PdC) pour un agent gaz :
A) Est liée à l'électricité
B) En gaz, on parle de capacité d'interruption : s'assurer qu'une vanne peut fermer mécaniquement contre la différence de pression maximale du réseau (Delta P) sans se bloquer
C) Est le diamètre du tube
D) Le temps de fermeture
Réponse : B - Justification : Une vanne papillon géante soumise à 70 bar de delta P requiert un moteur (actionneur) d'une puissance colossale pour pivoter.
Q94. Le "Gaz de Schiste" (Shale gas) est chimiquement :
A) Totalement différent du gaz conventionnel
B) Chimiquement identique au gaz naturel conventionnel (Méthane majoritaire), mais extrait de roches mères très peu perméables via fracturation hydraulique
C) Du butane toxique
D) Du charbon
Réponse : B - Justification : Le réseau ne fait aucune différence, le gaz est le même (CH4).
Q95. Le PE100 comparé au PE80 (Polyéthylène) offre :
A) Une couleur différente (noir vs jaune)
B) Une meilleure résistance mécanique, permettant d'utiliser des pressions de service plus élevées pour une même épaisseur de tube (ou des tubes plus fins pour la même pression)
C) Une soudure impossible
D) Un poids plus élevé
Réponse : B - Justification : C'est la génération supérieure de résine plastique.
Q96. L'opération de "Tirage au vide" avant la mise en gaz d'un grand réseau neuf sert à :
A) Remplir de gaz plus vite
B) Évacuer toute l'humidité résiduelle de l'épreuve hydraulique et assécher parfaitement la conduite
C) Aspirer la terre
D) Diminuer le diamètre
Réponse : B - Justification : Le vide fait bouillir l'eau résiduelle à basse température, asséchant totalement l'acier.
Q97. Une "Anode Galvanique" en Magnésium couplée à un tube en acier dans le sol :
A) Produit de la lumière
B) A un potentiel électrochimique plus négatif que l'acier. Elle va se corroder et se détruire (sacrifier) en cédant ses électrons pour protéger la conduite en acier
C) Fait fondre l'acier
D) Mesure la pression
Réponse : B - Justification : C'est le principe de la protection cathodique par anode sacrificielle (sans source de courant électrique externe).
Q98. Les "Postes de Soutirage" (City Gate Stations) sont la frontière entre :
A) La mer et la terre
B) Le réseau de Transport national Haute Pression et le réseau de Distribution urbain (Moyenne Pression)
C) La maison et le compteur
D) Le compresseur et le puits
Réponse : B - Justification : C'est l'interface GRT (Transport) / GRD (Distribution), incluant filtration, comptage massif, réchauffage, détente et odorisation.
Q99. Pour arrêter un incendie sur une armoire de régulation gaz, le premier réflexe de sécurité du technicien Gazier est :
A) Pulvériser de l'eau sur les conduites HT
B) Couper immédiatement la "Vanne de Pied" ou vanne barrage amont du poste pour supprimer le combustible
C) Prendre une photo
D) Ouvrir les portes de l'armoire
Réponse : B - Justification : Le gaz enflammé s'éteint tout seul si la source est isolée.
Q100. En fin de Commissioning, le document "PV de Mise en Gaz" (Procès-Verbal) atteste légalement :
A) Que le chantier est peint
B) Que tous les essais de résistance, d'étanchéité, de purge (absence d'air/ATEX) ont été réalisés avec succès, et que l'infrastructure est transférée à l'exploitant de manière sécurisée
C) Le prix du gaz
D) L'arrivée des factures
Réponse : B - Justification : Document contractuel et légal transférant la responsabilité du constructeur vers l'exploitant gazier.

        // ==========================================

        const QuizModule = () => {
            const parseQCM = useMemo(() => {
                const qList = [];
                const blocks = rawGasQCMData.split(/(?=Q\d+\.)/g);
                blocks.forEach(b => {
                    b = b.trim();
                    if (!b.startsWith('Q')) return;
                    const qMatch = b.match(/^Q(\d+)\.\s*(.*?)(?=A\))/s);
                    if (!qMatch) return;
                    
                    const id = parseInt(qMatch[1]);
                    const qText = qMatch[2].trim();
                    const options = [];
                    const letters = ['A', 'B', 'C', 'D'];
                    for (let i=0; i<letters.length; i++) {
                        let nL = letters[i+1];
                        let rStr = nL ? `${letters[i]}\\)\\s*(.*?)(?=${nL}\\)|Réponse\\s*:)` : `${letters[i]}\\)\\s*(.*?)(?=Réponse\\s*:)`;
                        const oMatch = b.match(new RegExp(rStr, 's'));
                        if (oMatch) options.push({ id: letters[i], text: oMatch[1].trim() });
                    }
                    const rMatch = b.match(/Réponse\s*:\s*([A-D])\s*-\s*Justification\s*:\s*(.*)/s);
                    if (rMatch) qList.push({ id, question: qText, options, correctAnswer: rMatch[1].trim(), justification: rMatch[2].trim() });
                });
                return qList;
            }, []);

            const [screen, setScreen] = useState('home'); 
            const [cIdx, setCIdx] = useState(0);
            const [selOpt, setSelOpt] = useState(null);
            const [isVal, setIsVal] = useState(false);
            const [score, setScore] = useState(0);

            const start = () => { setCIdx(0); setScore(0); setSelOpt(null); setIsVal(false); setScreen('quiz'); };
            const valider = () => { if(!selOpt) return; setIsVal(true); if(selOpt === parseQCM[cIdx].correctAnswer) setScore(score+1); };
            const next = () => { if(cIdx+1 < parseQCM.length) { setCIdx(cIdx+1); setSelOpt(null); setIsVal(false); } else setScreen('result'); };

            if (screen === 'home') return (
                <div className="flex flex-col items-center justify-center animate-fadeIn text-center space-y-6 pt-10">
                    <div className="bg-orange-500/20 p-6 rounded-full border border-orange-500/30"><Icons.Shield className="w-16 h-16 text-orange-400" /></div>
                    <h2 className="text-3xl font-black text-white">Évaluation Habilitation GAZ</h2>
                    <p className="text-slate-400 max-w-lg">Base de données officielle : {parseQCM.length} questions professionnelles sur la distribution, la sécurité ATEX, le PEHD et les postes de détente.</p>
                    <button onClick={start} className="py-4 px-8 bg-orange-600 hover:bg-orange-500 text-white font-black rounded-xl shadow-lg shadow-orange-600/30 transition-all flex items-center"><Icons.Play className="w-5 h-5 mr-3"/> Démarrer le Test</button>
                </div>
            );

            if (screen === 'quiz') {
                const q = parseQCM[cIdx];
                const pct = ((cIdx+1)/parseQCM.length)*100;
                return (
                    <div className="max-w-4xl mx-auto animate-fadeIn pb-10">
                        <div className="mb-6"><div className="flex justify-between text-xs font-bold text-slate-500 mb-2"><span>Question {cIdx+1} / {parseQCM.length}</span><span>{Math.round(pct)}%</span></div><div className="w-full bg-slate-800 rounded-full h-2"><div className="bg-orange-500 h-2 rounded-full transition-all" style={{width:`${pct}%`}}></div></div></div>
                        <div className="glass-panel p-6 md:p-8 rounded-2xl">
                            <h3 className="text-xl font-bold text-white mb-6 leading-relaxed"><span className="text-orange-500 mr-2">Q{q.id}.</span>{q.question}</h3>
                            <div className="space-y-3">
                                {q.options.map(o => {
                                    let bClass = "w-full text-left p-4 rounded-xl border transition-all flex items-center ";
                                    if(!isVal) bClass += selOpt === o.id ? "bg-orange-500/20 border-orange-500" : "bg-slate-800/50 border-slate-700 hover:border-orange-500/50";
                                    else bClass += o.id === q.correctAnswer ? "bg-emerald-500/20 border-emerald-500" : (selOpt===o.id ? "bg-rose-500/20 border-rose-500" : "bg-slate-800/30 border-slate-800 opacity-50");
                                    return (
                                        <button key={o.id} disabled={isVal} onClick={()=>setSelOpt(o.id)} className={bClass}>
                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mr-4 ${!isVal && selOpt===o.id ? 'bg-orange-500 text-white' : (isVal && o.id===q.correctAnswer ? 'bg-emerald-500' : (isVal && selOpt===o.id ? 'bg-rose-500' : 'bg-slate-900 text-slate-400'))}`}>{o.id}</span>
                                            <span className={`font-medium ${isVal && o.id===q.correctAnswer ? 'text-emerald-400' : 'text-slate-200'}`}>{o.text}</span>
                                        </button>
                                    );
                                })}
                            </div>
                            {isVal && <div className="mt-6 p-4 bg-blue-900/30 border border-blue-800/50 rounded-xl animate-fadeIn"><h4 className="font-bold text-blue-400 mb-1 text-sm uppercase">Justification :</h4><p className="text-blue-100 text-sm">{q.justification}</p></div>}
                            <div className="mt-8 flex justify-end">
                                {!isVal ? <button onClick={valider} disabled={!selOpt} className="py-3 px-6 bg-orange-600 hover:bg-orange-500 disabled:opacity-50 text-white font-bold rounded-xl transition-all">Valider</button>
                                        : <button onClick={next} className="py-3 px-6 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl transition-all flex items-center">{cIdx+1 < parseQCM.length ? 'Suivante' : 'Résultats'} <Icons.Play className="w-4 h-4 ml-2"/></button>}
                            </div>
                        </div>
                    </div>
                );
            }

            const rPct = Math.round((score/parseQCM.length)*100);
            const passed = rPct >= 75;
            return (
                <div className="flex flex-col items-center justify-center animate-fadeIn text-center pt-10">
                    <div className={`p-6 rounded-full mb-6 border ${passed?'bg-emerald-500/20 border-emerald-500/50':'bg-rose-500/20 border-rose-500/50'}`}>{passed ? <Icons.CheckSquare className="w-16 h-16 text-emerald-400"/> : <Icons.Activity className="w-16 h-16 text-rose-400"/>}</div>
                    <h2 className={`text-4xl font-black mb-2 ${passed?'text-emerald-400':'text-rose-400'}`}>{passed ? 'Habilitation GAZ : Accordée' : 'Habilitation Refusée'}</h2>
                    <p className="text-slate-400 text-lg mb-8">Score final : {score} / {parseQCM.length} ({rPct}%)</p>
                    <button onClick={start} className="py-3 px-6 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold rounded-xl transition-all flex items-center"><Icons.Refresh className="w-5 h-5 mr-2"/> Refaire le test</button>
                </div>
            );
        };

        // ==========================================
        // MODULE 2: SIMULATION RÉSEAU (GRAPHES)
        // ==========================================
        const GasCalcModule = () => {
            const [pressure, setPressure] = useState(4.0); // bar
            const [flow, setFlow] = useState(500); // m3/h
            const [diameter, setDiameter] = useState(100); // mm (PEHD)
            const [length, setLength] = useState(2000); // m

            // Formule de Renouard simplifiée: P1^2 - P2^2 = 4810 * L * Q^1.82 / D^4.82 (pour MP)
            const calcPressureDrop = useMemo(() => {
                let data = [];
                let p1 = parseFloat(pressure);
                let L_total = parseFloat(length);
                let Q = parseFloat(flow);
                let D = parseFloat(diameter);
                let failed = false;

                const K = 4810; // Cste gaz naturel
                
                for(let x=0; x<=L_total; x += (L_total/20)) {
                    let dropTerm = (K * x * Math.pow(Q, 1.82)) / Math.pow(D, 4.82);
                    let p2_squared = Math.pow(p1+1, 2) - dropTerm; // P absolue
                    let p2 = p2_squared > 1 ? Math.sqrt(p2_squared) - 1 : 0; // P relative
                    
                    if (p2 <= 0) failed = true;
                    data.push({ distance: Math.round(x), pression: failed ? 0 : parseFloat(p2.toFixed(2)) });
                }
                let finalP = data[data.length-1].pression;
                let velocity = (353.7 * Q) / (Math.pow(D, 2) * (finalP + 1)); // Vitesse gaz (m/s)

                return { data, finalP, velocity: isNaN(velocity)?0:velocity.toFixed(1), failed };
            }, [pressure, flow, diameter, length]);

            return (
                <div className="space-y-6">
                    <div className="glass-panel p-6 rounded-2xl">
                        <div className="flex items-center mb-6 border-b border-slate-700 pb-4">
                            <div className="bg-sky-500/20 p-3 rounded-lg mr-4 border border-sky-500/30"><Icons.Gauge className="w-6 h-6 text-sky-400"/></div>
                            <div>
                                <h2 className="text-xl font-bold text-white">Simulation de Perte de Charge (Réseau PEHD)</h2>
                                <p className="text-sm text-slate-400">Graphe dynamique d'écoulement du gaz basé sur la formule de Renouard (MPB/MPC).</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <div><label className="block text-xs font-bold text-slate-400 mb-1">Pression Amont (bar)</label><input type="number" step="0.1" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-sky-500" value={pressure} onChange={e=>setPressure(e.target.value)} /></div>
                            <div><label className="block text-xs font-bold text-slate-400 mb-1">Débit Transité (m³/h)</label><input type="number" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-sky-500" value={flow} onChange={e=>setFlow(e.target.value)} /></div>
                            <div><label className="block text-xs font-bold text-slate-400 mb-1">Diamètre Int. (mm)</label><input type="number" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-sky-500" value={diameter} onChange={e=>setDiameter(e.target.value)} /></div>
                            <div><label className="block text-xs font-bold text-slate-400 mb-1">Longueur (m)</label><input type="number" className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm outline-none focus:border-sky-500" value={length} onChange={e=>setLength(e.target.value)} /></div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="col-span-1 space-y-4">
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                    <p className="text-xs text-slate-400 font-bold uppercase">Pression Résiduelle Aval</p>
                                    <p className={`text-3xl font-black mt-1 ${calcPressureDrop.failed ? 'text-rose-500' : 'text-emerald-400'}`}>{calcPressureDrop.failed ? 'RÉSEAU SATURÉ' : `${calcPressureDrop.finalP} bar`}</p>
                                </div>
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                    <p className="text-xs text-slate-400 font-bold uppercase">Vitesse du gaz en aval</p>
                                    <p className={`text-2xl font-black mt-1 ${parseFloat(calcPressureDrop.velocity) > 20 ? 'text-orange-400' : 'text-sky-400'}`}>{calcPressureDrop.velocity} m/s</p>
                                    <p className="text-[10px] text-slate-500 mt-1">L'érosion commence > 20 m/s</p>
                                </div>
                            </div>
                            
                            <div className="col-span-2 graph-container h-[300px]">
                                <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2 pl-2">Profil de Pression (Renouard)</p>
                                <ResponsiveContainer width="100%" height="90%">
                                    <AreaChart data={calcPressureDrop.data} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                        <XAxis dataKey="distance" stroke="#94a3b8" label={{ value: 'Distance (m)', position: 'insideBottomRight', fill: '#94a3b8', fontSize: 12, offset:-5 }} />
                                        <YAxis stroke="#94a3b8" domain={[0, 'auto']} label={{ value: 'Pression (bar)', angle: -90, position: 'insideLeft', fill: '#94a3b8', fontSize: 12 }} />
                                        <Tooltip contentStyle={{backgroundColor: '#0f172a', borderColor: '#334155', color:'#fff'}} />
                                        <Area type="monotone" dataKey="pression" stroke="#38bdf8" strokeWidth={3} fill="#0ea5e9" fillOpacity={0.2} name="Pression" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // MODULE 3 : COMMISSIONING GAZ
        // ==========================================
        const ChecklistModule = () => {
            const [tasks, setTasks] = useState([
                { id: 1, section: "CONTRÔLE SOUDEUR", desc: "Inspection visuelle des bourrelets PEHD ou radios tirs Acier validés (CND 100%).", done: false },
                { id: 2, section: "ÉPREUVE MÉCANIQUE", desc: "Essai de résistance mécanique Air/Azote à 1.5x DP validé sans éclatement.", done: false },
                { id: 3, section: "ÉTANCHÉITÉ", desc: "Essai d'étanchéité sous Air à DP validé (Stabilité manomètre après équilibre thermique).", done: false },
                { id: 4, section: "POSTE DÉTENTE", desc: "Slam-Shut (Clapet) testé aux seuils Max et Min (Vérification du tarage du ressort).", done: false },
                { id: 5, section: "MISE EN GAZ", desc: "Balayage et purge d'air totale. Concentration 100% Méthane vérifiée à l'explosimètre.", done: false },
                { id: 6, section: "SÉCURITÉ", desc: "Contrôle THT (Odorisation) et recherche finale de fuites (Mille-bulles) sous pression Gaz.", done: false }
            ]);

            const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            const progress = Math.round((tasks.filter(t => t.done).length / tasks.length) * 100);

            return (
                <div className="glass-panel p-6 md:p-8 rounded-2xl">
                    <div className="flex items-center mb-8 border-b border-slate-700 pb-4">
                        <div className="bg-amber-500/20 p-3 rounded-xl mr-4 border border-amber-500/30"><Icons.CheckSquare className="w-6 h-6 text-amber-400"/></div>
                        <div>
                            <h2 className="text-xl font-bold text-white">Canevas Commissioning Réseau GAZ</h2>
                            <p className="text-sm text-slate-400">PV de validation réglementaire avant l'injection du Gaz Naturel</p>
                        </div>
                    </div>

                    <div className="mb-8">
                        <div className="flex justify-between text-sm font-bold text-slate-300 mb-3">
                            <span>Progression du Procès-Verbal (PV)</span>
                            <span className={progress === 100 ? "text-emerald-400 text-lg" : "text-lg text-slate-300"}>{progress}%</span>
                        </div>
                        <div className="w-full bg-slate-800 rounded-full h-4 overflow-hidden border border-slate-700">
                            <div className={`h-4 rounded-full transition-all duration-700 ease-out ${progress === 100 ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {tasks.map(task => (
                            <div key={task.id} onClick={() => toggleTask(task.id)} className={`flex items-start p-4 rounded-xl border cursor-pointer transition-all ${task.done ? 'bg-emerald-500/10 border-emerald-500/50 shadow-sm' : 'bg-slate-800/50 border-slate-700 hover:border-amber-500/50'}`}>
                                <div className={`w-6 h-6 shrink-0 rounded-md flex items-center justify-center mr-4 border-2 mt-0.5 transition-colors ${task.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-500 bg-slate-900'}`}>
                                    {task.done && <Icons.CheckSquare className="w-4 h-4"/>}
                                </div>
                                <div>
                                    <span className={`text-[10px] font-black uppercase tracking-widest ${task.done ? 'text-emerald-400' : 'text-slate-500'}`}>{task.section}</span>
                                    <p className={`font-semibold text-sm leading-tight mt-1 ${task.done ? 'text-slate-500 line-through' : 'text-slate-200'}`}>{task.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // MAIN APP DASHBOARD
        // ==========================================
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            const TabBtn = ({ id, icon: Icon, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-lg font-bold text-sm transition-all duration-200 ${activeTab === id ? 'bg-orange-600 text-white shadow-lg border border-orange-500/50' : 'text-slate-400 hover:bg-slate-800/80 hover:text-slate-200'}`}>
                    <Icon className="w-5 h-5"/> <span>{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen w-full relative bg-slate-950">
                    
                    {/* ARRIÈRE-PLAN GAZ + GLASSMORPHISM */}
                    <div className="absolute inset-0 z-0 opacity-10 mix-blend-luminosity">
                        {/* Motif tuyauterie industriel / flamme implicite */}
                        <div className="w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-orange-900/40 via-slate-950 to-slate-950"></div>
                    </div>

                    {/* SIDEBAR LOGICIEL */}
                    <div className="w-72 glass-dark text-white flex flex-col shadow-2xl z-20 hidden lg:flex shrink-0">
                        <div className="p-5 flex items-center space-x-4 border-b border-slate-700/50 bg-slate-900/60">
                            <div className="bg-orange-500 p-1.5 rounded-lg shadow-lg flex-shrink-0">
                                <Icons.Flame className="w-6 h-6 text-white" />
                            </div>
                            <div>
                                <h1 className="font-black text-lg tracking-tight text-white leading-tight">Sonelgaz STOS</h1>
                                <p className="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Test & Ingénierie GAZ</p>
                            </div>
                        </div>
                        
                        <div className="p-4 flex-grow space-y-1.5 overflow-y-auto">
                            <div className="pt-2 pb-2 px-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">Menu Principal</div>
                            <TabBtn id="dashboard" icon={Icons.Server} label="Tableau de bord" />
                            <TabBtn id="quiz" icon={Icons.Shield} label="Habilitation GAZ (QCM)" />
                            <TabBtn id="calc" icon={Icons.Gauge} label="Simulation Réseau (Graphes)" />
                            <TabBtn id="check" icon={Icons.CheckSquare} label="Commissioning (PV)" />
                        </div>

                        {/* SIGNATURE MINIMISÉE EN BAS */}
                        <div className="p-5 bg-slate-900/90 border-t border-slate-800 text-center mt-auto">
                            <p className="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1">Plateforme réalisée par</p>
                            <p className="text-xs font-bold text-orange-400">MR. HAKMI ABDELKRIM</p>
                            <p className="text-[9px] text-slate-400 mt-0.5">INGÉNIEUR ÉTUDES - SONELGAZ STOS/DIST ORAN</p>
                        </div>
                    </div>

                    {/* MAIN AREA */}
                    <div className="flex-1 flex flex-col h-full relative z-10 overflow-y-auto">
                        
                        {/* Header Mobile */}
                        <div className="lg:hidden glass-dark p-4 flex justify-between items-center text-white sticky top-0 z-30 shadow-md">
                            <div className="flex items-center space-x-2"><Icons.Flame className="w-5 h-5 text-orange-500"/><span className="font-black text-orange-400">STOS GAZ</span></div>
                            <select className="bg-slate-800 text-xs p-2 rounded border border-slate-700 outline-none" value={activeTab} onChange={e=>setActiveTab(e.target.value)}>
                                <option value="dashboard">Tableau de bord</option>
                                <option value="quiz">Habilitation GAZ</option>
                                <option value="calc">Simulation Réseau</option>
                                <option value="check">Commissioning (PV)</option>
                            </select>
                        </div>

                        <div className="p-4 md:p-6 lg:p-8 w-full max-w-6xl mx-auto space-y-6">
                            
                            {activeTab === 'dashboard' && (
                                <div className="animate-fadeIn space-y-8 pb-10">
                                    <header className="mb-10 text-white">
                                        <h1 className="text-4xl md:text-6xl font-black tracking-tight drop-shadow-lg">Plateforme Ingénierie & Distribution GAZ</h1>
                                        <p className="text-slate-300 mt-4 text-xl max-w-3xl font-light drop-shadow-md">Logiciel professionnel pour les calculs de pertes de charge, le commissioning des postes et la validation des habilitations gazières.</p>
                                    </header>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div onClick={()=>setActiveTab('quiz')} className="glass-panel p-6 rounded-2xl shadow-xl hover:bg-slate-800/80 transition-all cursor-pointer group flex items-start border-t-4 border-t-orange-500">
                                            <div className="bg-orange-500/20 p-4 rounded-xl mr-5 border border-orange-500/30 group-hover:scale-110 transition-transform"><Icons.Shield className="w-8 h-8 text-orange-400"/></div>
                                            <div><h3 className="font-black text-white text-xl">Habilitation GAZ (QCM)</h3><p className="text-sm text-slate-400 mt-2 font-medium">100 questions officielles : Réglementation, ATEX, PEHD et détendeurs.</p></div>
                                        </div>
                                        <div onClick={()=>setActiveTab('calc')} className="glass-panel p-6 rounded-2xl shadow-xl hover:bg-slate-800/80 transition-all cursor-pointer group flex items-start border-t-4 border-t-sky-500">
                                            <div className="bg-sky-500/20 p-4 rounded-xl mr-5 border border-sky-500/30 group-hover:scale-110 transition-transform"><Icons.Gauge className="w-8 h-8 text-sky-400"/></div>
                                            <div><h3 className="font-black text-white text-xl">Simulation Réseau</h3><p className="text-sm text-slate-400 mt-2 font-medium">Calcul et tracé graphique des pertes de charge (Formule de Renouard).</p></div>
                                        </div>
                                        <div onClick={()=>setActiveTab('check')} className="glass-panel p-6 rounded-2xl shadow-xl hover:bg-slate-800/80 transition-all cursor-pointer group flex items-start border-t-4 border-t-amber-500 md:col-span-2">
                                            <div className="bg-amber-500/20 p-4 rounded-xl mr-5 border border-amber-500/30 group-hover:scale-110 transition-transform"><Icons.CheckSquare className="w-8 h-8 text-amber-400"/></div>
                                            <div><h3 className="font-black text-white text-xl">Commissioning Réseaux Gaz</h3><p className="text-sm text-slate-400 mt-2 font-medium">Canevas numérique de mise en gaz, essais d'étanchéité, résistance et réglage de la détente.</p></div>
                                        </div>
                                    </div>
                                    
                                    {/* SIGNATURE VISIBLE SUR LE DASHBOARD MOBILE ÉGALEMENT */}
                                    <div className="lg:hidden mt-10 text-center border-t border-slate-700/50 pt-6 pb-4">
                                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Plateforme réalisée par</p>
                                        <p className="text-sm font-bold text-orange-400">MR. HAKMI ABDELKRIM</p>
                                        <p className="text-[10px] text-slate-500 mt-0.5">INGÉNIEUR ÉTUDES - SONELGAZ STOS/DIST ORAN</p>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'quiz' && <QuizModule />}
                            {activeTab === 'calc' && <div className="animate-fadeIn pb-10"><GasCalcModule /></div>}
                            {activeTab === 'check' && <div className="animate-fadeIn pb-10"><ChecklistModule /></div>}

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
